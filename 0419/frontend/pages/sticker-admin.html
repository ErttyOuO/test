<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貼圖管理後台 - 百保袋 InsureTech</title>
    <meta name="description" content="貼圖管理後台：新增、刪除、搜尋貼圖">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== 設計系統變數 ===== */
        :root {
            --bg-deep: #0f1218;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8e8e8;
            --text-dim: #888;
            --accent-green: #58a6ff;
            --accent-green-dim: rgba(88, 166, 255, 0.14);
            --accent-red: #ef4444;
            --accent-red-dim: rgba(239, 68, 68, 0.12);
            --accent-blue: #60a5fa;
            --accent-blue-dim: rgba(96, 165, 250, 0.12);
            --accent-purple: #a855f7;
            --accent-purple-dim: rgba(168, 85, 247, 0.12);
            --gold: #FFD700;
            --radius: 14px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(145deg, var(--bg-deep) 0%, #111827 50%, #0a0e17 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            display: flex;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-green), #7BB369);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }

        .logo-section span {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        .nav-links {
            display: flex;
            gap: 0.3rem;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.82rem;
            padding: 0.35rem 0.7rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-links a.active {
            color: var(--accent-red);
            background: var(--accent-red-dim);
            font-weight: 600;
        }

        /* ===== Admin Title Banner ===== */
        .admin-banner {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
            position: relative;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: var(--accent-red-dim);
            color: var(--accent-red);
            margin-bottom: 0.8rem;
        }

        .admin-banner h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .admin-banner p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.82rem;
        }

        .stat-chip .chip-num {
            font-weight: 700;
            font-size: 1rem;
        }

        .stat-chip.total .chip-num {
            color: var(--accent-green);
        }

        .stat-chip.categories .chip-num {
            color: var(--accent-blue);
        }

        /* ===== Main Container ===== */
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 1.5rem;
        }

        /* ===== 左側：新增貼圖面板 ===== */
        .add-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .add-panel h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent-green);
        }

        .form-group select option {
            background: #1e2333;
            color: var(--text);
        }

        /* 上傳區域 */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--accent-green);
            background: var(--accent-green-dim);
        }

        .upload-area.has-image {
            border-style: solid;
            border-color: var(--accent-green);
            padding: 0.5rem;
        }

        .upload-area .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .upload-area .upload-text {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .upload-area img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            object-fit: contain;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .btn-add {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-green), #7BB369);
            color: #000;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-add:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 右側：貼圖列表 ===== */
        .list-panel {
            min-width: 0;
        }

        .list-toolbar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text-dim);
        }

        .filter-select {
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .filter-select option {
            background: #1e2333;
        }

        /* ===== Sticker Grid ===== */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .sticker-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .sticker-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .sticker-card .sticker-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            margin: 0 auto 0.6rem;
            display: block;
            background: rgba(255, 255, 255, 0.03);
        }

        /* 貼圖主圖區域（顯示上傳圖片或大 emoji） */
        .sticker-card .sticker-img-area {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            margin: 0 auto 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(156, 201, 141, 0.1), rgba(96, 165, 250, 0.1));
            overflow: hidden;
        }

        .sticker-card .sticker-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sticker-card .sticker-img-area .img-placeholder {
            font-size: 2.5rem;
        }

        /* Emoji 角標（右下角小徽章） */
        .sticker-card .sticker-emoji-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 22px;
            height: 22px;
            font-size: 0.8rem;
            background: rgba(30, 35, 51, 0.9);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .sticker-card .sticker-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .sticker-card .sticker-id {
            font-size: 0.68rem;
            color: var(--text-dim);
            font-family: monospace;
            margin-bottom: 0.15rem;
        }

        .sticker-card .sticker-category {
            font-size: 0.68rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            background: var(--accent-green-dim);
            color: var(--accent-green);
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .sticker-card .btn-delete {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            width: 100%;
            padding: 0.4rem;
            border: none;
            border-radius: 8px;
            background: var(--accent-red-dim);
            color: var(--accent-red);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sticker-card .btn-delete:hover {
            background: var(--accent-red);
            color: #fff;
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: #1e2333;
            color: var(--text);
            padding: 0.8rem 1.5rem;
            border-radius: 14px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 確認刪除 Modal ===== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .confirm-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .confirm-card {
            background: #1e2333;
            border-radius: var(--radius);
            padding: 1.5rem;
            width: min(360px, 90vw);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .confirm-card h3 {
            margin-bottom: 0.5rem;
        }

        .confirm-card p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }

        .confirm-actions {
            display: flex;
            gap: 0.5rem;
        }

        .confirm-actions button {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-confirm-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
        }

        .btn-confirm-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-confirm-delete {
            background: var(--accent-red);
            color: #fff;
        }

        .btn-confirm-delete:hover {
            filter: brightness(1.15);
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-dim);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 800px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .add-panel {
                position: static;
            }

            .sticker-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 0.6rem 1rem;
            }

            .nav-links a {
                font-size: 0.72rem;
                padding: 0.3rem 0.45rem;
            }

            .admin-banner h1 {
                font-size: 1.4rem;
            }
        }

        ::selection {
            background: var(--accent-green);
            color: #000;
        }

        /* ===== 動畫 ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sticker-card {
            animation: fadeInUp 0.3s ease forwards;
        }
    
        /* ===== RWD & Hamburger Menu ===== */
        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
            /* Positioning for absolute cases */
            position: relative;
        }

        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #FFFFFF !important;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Hamburger open state */
        .hamburger-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .hamburger-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .hamburger-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }
            /* Header Specific */
            header {
                padding: 0.8rem 5% !important;
            }
        
            .hamburger-btn {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 260px;
                height: 100vh;
                background-color: rgba(15, 15, 15, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column !important;
                align-items: flex-start !important;
                justify-content: flex-start !important;
                padding: 5rem 2rem 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
                z-index: 999;
                /* Reset existing gap to ensure clean layout */
                gap: 1.5rem !important; 
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.15rem !important;
                width: 100%;
                padding-bottom: 0.8rem;
                display: block;
            }

            /* Generic Resizing Fixes for Cards and Grids */
            .stats-row {
                flex-direction: column;
                gap: 1.2rem !important;
            }
            
            .card-grid, .shop-grid, .stamp-grid {
                grid-template-columns: 1fr !important;
            }

            /* Fixes explicitly for admin dashboard columns */
            .sidebar {
                width: 100% !important;
                position: static !important;
                height: auto !important;
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }
            .main-content {
                padding: 1.5rem !important;
            }

            /* Modal widths */
            .modal-content, .task-modal-content, .shop-modal-content {
                width: 90% !important;
                margin: 10vh auto !important;
                padding: 1.5rem !important;
            }
            
            /* Pricing Tiers / Subscription Page */
            .pricing-tier {
                flex: none !important;
                width: 100%;
            }
            .pricing-tiers {
                flex-direction: column !important;
                gap: 1.5rem !important;
            }
            .compare-table {
                display: block;
                overflow-x: auto;
            }
            
            /* Sponsor Dashboard Layout */
            .dashboard-layout {
                grid-template-columns: 1fr !important;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }
            /* Force auth tools to hide when space is too tight or neatly align */
            .header-right { margin-left: auto; gap: 0.5rem; }
            .auth-info-bar, .user-auth { display: none !important; } /* Simplify header on mobile */
            
            /* Give hamburger priority */
            .hamburger-btn { margin-left: 10px; }
            
            /* Logo resizing */
            .logo-section span { font-size: 1rem; }
        }

        /* ===== Global Vertical Space Reduction (Mobile) ===== */
        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }
            /* Reduce padding on hero sections to save space */
            .hero-section, .sub-hero, .wallet-hero, .profile-hero {
                padding: 1.5rem 1rem 2.8rem !important;
            }
            
            .hero-section h1, .sub-hero h1, .wallet-hero h1 {
                font-size: 1.5rem !important;
                margin-bottom: 0.3rem !important;
            }
            .hero-section p, .sub-hero p {
                font-size: 0.9rem !important;
            }

            /* Main containers constraints */
            .main-content, .dashboard-layout {
                padding: 1rem !important;
                
            }

            /* Status bars or quick stats */
            .status-bar, .stats-row {
                padding: 0.8rem 1rem !important;
                margin-bottom: 1rem !important;
            }

            /* Info cards and section cards */
            .info-card, .section-card, .shop-item, .task-card {
                padding: 1rem !important;
                margin-bottom: 0.8rem !important;
            }
            
            .section-title {
                margin: 1.5rem 0 1rem !important;
            }
            .section-title h2 {
                font-size: 1.3rem !important;
            }

            /* Lists and rows inside cards */
            ul.plan-features li, .reward-row, .task-row, .history-item {
                padding: 0.4rem 0 !important;
            }
        }

    </style>
</head>

<body>
    <!-- 
      【頁面功能說明 — sticker-admin.html】
      貼圖管理員後台 (Sticker Admin)。供管理員上架新貼圖、設定價格、隱藏下架或編輯現有貼圖的詳細資訊。
    -->
    <!-- 【新手導讀】這是管理者後台的 Header -->
    <header>
        <a href="subscription.html" class="logo-section" style="text-decoration:none;">
            <div class="logo-icon">譯</div>
            <span>百保袋</span>
        </a>
        <div class="header-right">
                        <button class="hamburger-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a href="subscription.html">方案</a>
                <a href="stickers.html">貼圖商城</a>
                <a href="sticker-admin.html" class="active">⚙️ 管理後台</a>
            <a href="index.html">首頁</a>
                <a href="consulting.html">保險諮詢</a>
                <a href="dm.html">保單目錄</a>
                <a href="budget.html">費用預算</a>
                <a href="policy.html">智慧保單</a>
                <a href="community.html">匿名社群</a>
</div>
        </div>
    </header>

    <!-- 管理者模式標題區塊 -->
    <section class="admin-banner">
        <div class="admin-badge">🔐 管理者模式</div>
        <h1>🎨 貼圖管理後台</h1>
        <p>新增 / 刪除 / 搜尋貼圖，管理 stickers.json 資料</p>
    </section>

    <!-- 統計概覽 -->
    <div class="stats-bar">
        <div class="stat-chip total">
            <span>📦 貼圖總數</span>
            <span class="chip-num" id="stat-total">0</span>
        </div>
        <div class="stat-chip categories">
            <span>📂 分類數</span>
            <span class="chip-num" id="stat-categories">0</span>
        </div>
    </div>

    <!-- 主要內容 -->
    <div class="admin-container">
        <!-- 左側：新增貼圖 -->
        <div class="add-panel">
            <h3>➕ 新增貼圖</h3>

            <div class="form-group">
                <label>貼圖名稱</label>
                <input type="text" id="input-name" placeholder="例如：保險貓貓" maxlength="30">
            </div>

            <div class="form-group">
                <label>Emoji 圖示</label>
                <input type="text" id="input-emoji" placeholder="例如：🐱" maxlength="4">
            </div>

            <div class="form-group">
                <label>描述</label>
                <input type="text" id="input-desc" placeholder="例如：最受歡迎的保險小助手" maxlength="50">
            </div>

            <div class="form-group">
                <label>分類</label>
                <select id="input-category">
                    <option value="保險日常">保險日常</option>
                    <option value="通用表情">通用表情</option>
                    <option value="VIP 限定">VIP 限定</option>
                    <option value="節日特別">節日特別</option>
                    <option value="__custom__">✏️ 自訂分類...</option>
                </select>
            </div>

            <div class="form-group" id="custom-category-group" style="display:none;">
                <label>自訂分類名稱</label>
                <input type="text" id="input-custom-category" placeholder="輸入新分類名稱">
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:0.5rem;">
                    <input type="checkbox" id="input-vip" style="width:auto;"> VIP 限定貼圖
                </label>
            </div>

            <div class="form-group">
                <label>貼圖圖片（選填）</label>
                <div class="upload-area" id="upload-area" onclick="document.getElementById('input-file').click()">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">點擊或拖曳上傳圖片</div>
                    <input type="file" id="input-file" accept="image/*">
                </div>
            </div>

            <button class="btn-add" id="btn-add" onclick="addSticker()">✅ 新增貼圖</button>
        </div>

        <!-- 右側：貼圖列表 -->
        <div class="list-panel">
            <div class="list-toolbar">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="搜尋貼圖名稱..." oninput="renderStickerGrid()">
                </div>
                <select class="filter-select" id="filter-category" onchange="renderStickerGrid()">
                    <option value="">全部分類</option>
                    <!-- JS 動態填入 -->
                </select>
            </div>

            <div class="sticker-grid" id="sticker-grid">
                <!-- JS 動態渲染 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toast-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <!-- 確認刪除 Modal -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-card">
            <h3>⚠️ 確認刪除</h3>
            <p id="confirm-msg">確定要刪除這個貼圖嗎？此操作無法復原。</p>
            <div class="confirm-actions">
                <button class="btn-confirm-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-confirm-delete" id="btn-confirm-delete">刪除</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 百保袋 InsureTech ｜ 貼圖管理後台（僅限管理者存取）</p>
    </footer>

    <script>
        // ====================================================================
        // 【新手導讀 — sticker-admin.html 的 JavaScript】
        // ====================================================================
        // 貼圖管理後台：新增/刪除貼圖，管理 stickers.json 資料
        //
        // 資料來源優先順序：
        //   1. 從 /stickers/stickers.json 讀取（fetch）
        //   2. 若 fetch 失敗 → 從 localStorage 讀取（fallback）
        //
        // 所有操作都會同時更新 stickerData 陣列 + localStorage
        //
        // 【遷移須知】未來改為真正後端 API 時：
        //   - loadStickers()   → GET  /api/stickers
        //   - addSticker()     → POST /api/stickers  (含 multipart 上傳)
        //   - deleteSticker()  → DELETE /api/stickers/:id
        //   - localStorage 僅作為離線快取，不再是主要資料源
        // ====================================================================

        // ===== 核心資料 =====
        // 所有貼圖集中在這個陣列管理
        let stickerData = [];

        // 暫存上傳圖片的 base64（前端預覽用）
        let uploadedImageBase64 = '';

        // 等待刪除確認的貼圖 ID
        let pendingDeleteId = '';

        // localStorage 的 key
        const STORAGE_KEY = 'admin_sticker_data';


        // ===== 初始化：載入貼圖資料 =====
        // 優先從 stickers.json 讀取，若失敗則從 localStorage fallback
        async function loadStickers() {
            try {
                // 嘗試從 stickers.json 載入
                const res = await fetch('../assets/stickers/stickers.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                stickerData = await res.json();

                // 同時存一份到 localStorage 作為快取
                saveToLocalStorage();
                console.log('[Admin] 從 stickers.json 載入成功，共', stickerData.length, '筆');
            } catch (err) {
                console.warn('[Admin] 無法載入 stickers.json，嘗試 localStorage fallback:', err.message);

                // Fallback：從 localStorage 讀取
                const cached = localStorage.getItem(STORAGE_KEY);
                if (cached) {
                    try {
                        stickerData = JSON.parse(cached);
                        console.log('[Admin] 從 localStorage 載入，共', stickerData.length, '筆');
                    } catch {
                        stickerData = [];
                    }
                } else {
                    // 完全沒資料 → 使用內建範例
                    stickerData = getDefaultStickers();
                    saveToLocalStorage();
                    console.log('[Admin] 使用預設貼圖資料');
                }
            }

            renderAll();
        }


        // ===== 預設貼圖資料 =====
        // 與 stickers.html 共用同一份預設資料（確保一致）
        function getDefaultStickers() {
            return [
                { id: 's01', emoji: '🐱', name: '保險貓貓', desc: '最受歡迎的保險小助手', category: '保險日常', vip: false },
                { id: 's02', emoji: '🐶', name: '理賠汪汪', desc: '理賠流程專家', category: '保險日常', vip: false },
                { id: 's03', emoji: '🦊', name: '精算狐狸', desc: '精算你的每一分保費', category: '保險日常', vip: false },
                { id: 's04', emoji: '🐼', name: '保障熊貓', desc: '全方位保障代言人', category: '保險日常', vip: false },
                { id: 's05', emoji: '🐰', name: '健康兔兔', desc: '醫療險小幫手', category: '通用表情', vip: false },
                { id: 's06', emoji: '🦁', name: '威力獅王', desc: '壽險保障的王者', category: '通用表情', vip: false },
                { id: 's07', emoji: '🐸', name: '省錢蛙蛙', desc: '幫你找到最划算方案', category: '通用表情', vip: false },
                { id: 's08', emoji: '🦉', name: '智慧貓頭鷹', desc: '保險知識百科', category: '通用表情', vip: false },
                { id: 's09', emoji: '🐧', name: '企鵝管家', desc: '保單管理小幫手', category: '通用表情', vip: false },
                { id: 's10', emoji: '🦄', name: '獨角獸', desc: '夢幻保障方案設計師', category: 'VIP 限定', vip: true },
                { id: 's11', emoji: '🐉', name: '金龍守護', desc: 'VIP 專屬頂級貼圖', category: 'VIP 限定', vip: true },
                { id: 's12', emoji: '🦋', name: '蝴蝶天使', desc: '優雅的理賠協助員', category: 'VIP 限定', vip: true },
                { id: 's13', emoji: '🐬', name: '海豚顧問', desc: '深海般的專業諮詢', category: 'VIP 限定', vip: true },
                { id: 's14', emoji: '🦅', name: '老鷹總監', desc: 'VIP 專屬高階顧問', category: 'VIP 限定', vip: true },
                { id: 's15', emoji: '🐙', name: '八爪章魚', desc: '多工處理保單達人', category: '保險日常', vip: false },
                { id: 's16', emoji: '🦜', name: '鸚鵡播報', desc: '即時通知你的理賠進度', category: '保險日常', vip: false },
            ];
        }


        // ===== 存到 localStorage =====
        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stickerData));
        }


        // ===== 產生唯一 ID =====
        // 格式：s + 2位數 (與 stickers.html 一致，例如 s17, s18...)
        function generateId() {
            if (stickerData.length === 0) return 's01';

            // 找出目前最大的數字
            const nums = stickerData.map(s => {
                const match = s.id.match(/s(\d+)/);
                return match ? parseInt(match[1], 10) : 0;
            });
            const maxNum = Math.max(...nums);
            return 's' + String(maxNum + 1).padStart(2, '0');
        }


        // ===== 取得所有分類 =====
        function getCategories() {
            const cats = new Set(stickerData.map(s => s.category));
            return [...cats].sort();
        }


        // ===== 總渲染 =====
        function renderAll() {
            updateStats();
            updateCategoryFilter();
            renderStickerGrid();
        }


        // ===== 更新統計數字 =====
        function updateStats() {
            document.getElementById('stat-total').textContent = stickerData.length;
            document.getElementById('stat-categories').textContent = getCategories().length;
        }


        // ===== 更新分類篩選下拉選單 =====
        function updateCategoryFilter() {
            const select = document.getElementById('filter-category');
            const current = select.value; // 保留目前選擇
            select.innerHTML = '<option value="">全部分類</option>';

            getCategories().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                if (cat === current) opt.selected = true;
                select.appendChild(opt);
            });
        }


        // ===== 渲染貼圖網格 =====
        function renderStickerGrid() {
            const grid = document.getElementById('sticker-grid');
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const category = document.getElementById('filter-category').value;

            // 篩選
            let filtered = stickerData;

            if (keyword) {
                filtered = filtered.filter(s =>
                    s.name.toLowerCase().includes(keyword) ||
                    s.id.toLowerCase().includes(keyword)
                );
            }

            if (category) {
                filtered = filtered.filter(s => s.category === category);
            }

            // 空狀態
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">📭</div>
                        <div>沒有符合條件的貼圖</div>
                    </div>
                `;
                return;
            }

            // 渲染卡片
            grid.innerHTML = filtered.map((sticker, idx) => {
                // VIP 標記
                const vipTag = sticker.vip ? '<span style="color:var(--gold);font-size:0.7rem;">👑 VIP</span>' : '';

                return `
                    <div class="sticker-card" style="animation-delay: ${idx * 0.03}s">
                        <div class="sticker-img-area">
                            ${sticker._preview
                        ? `<img src="${sticker._preview}" alt="${sticker.name}">`
                        : `<span class="img-placeholder">${sticker.emoji || '🎨'}</span>`
                    }
                            <span class="sticker-emoji-badge">${sticker.emoji || ''}</span>
                        </div>
                        <div class="sticker-name">${sticker.name} ${vipTag}</div>
                        <div class="sticker-id">${sticker.id}</div>
                        ${sticker.desc ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:0.2rem;">${sticker.desc}</div>` : ''}
                        <div class="sticker-category">${sticker.category || '未分類'}</div>
                        <button class="btn-delete" onclick="confirmDelete('${sticker.id}')">
                            🗑️ 刪除
                        </button>
                    </div>
                `;
            }).join('');
        }


        // ===== 根據分類回傳 Emoji =====
        function getCategoryEmoji(category) {
            const map = {
                '保險日常': '🐾',
                '通用表情': '😊',
                'VIP 限定': '👑',
                '節日特別': '🎉',
            };
            return map[category] || '🎨';
        }


        // ===== 新增貼圖 =====
        // 【遷移須知】改為 POST /api/stickers（含 multipart 上傳圖片檔案）
        function addSticker() {
            const nameEl = document.getElementById('input-name');
            const catEl = document.getElementById('input-category');
            const customCatEl = document.getElementById('input-custom-category');

            const name = nameEl.value.trim();
            if (!name) {
                showToast('⚠️', '請輸入貼圖名稱');
                nameEl.focus();
                return;
            }

            // 決定分類
            let category = catEl.value;
            if (category === '__custom__') {
                category = customCatEl.value.trim();
                if (!category) {
                    showToast('⚠️', '請輸入自訂分類名稱');
                    customCatEl.focus();
                    return;
                }
            }

            // 讀取 emoji 和描述
            const emojiEl = document.getElementById('input-emoji');
            const descEl = document.getElementById('input-desc');
            const vipEl = document.getElementById('input-vip');

            // 產生新貼圖物件（與 stickers.html 共用的資料結構）
            const newId = generateId();
            const newSticker = {
                id: newId,
                emoji: emojiEl.value.trim() || '🎨',
                name: name,
                desc: descEl.value.trim() || '',
                category: category,
                vip: vipEl.checked,
            };

            // 如果有上傳圖片，暫存 base64 供預覽
            if (uploadedImageBase64) {
                newSticker._preview = uploadedImageBase64;
            }

            // 加到資料陣列
            stickerData.push(newSticker);
            saveToLocalStorage();

            // 清空表單
            nameEl.value = '';
            emojiEl.value = '';
            descEl.value = '';
            vipEl.checked = false;
            catEl.value = '保險日常';
            customCatEl.value = '';
            document.getElementById('custom-category-group').style.display = 'none';
            clearUpload();

            // 重新渲染
            renderAll();
            showToast('✅', `成功新增「${name}」(${newId})`);
        }


        // ===== 刪除貼圖 =====

        // 彈出確認刪除 Modal
        function confirmDelete(id) {
            const sticker = stickerData.find(s => s.id === id);
            if (!sticker) return;

            pendingDeleteId = id;
            document.getElementById('confirm-msg').textContent =
                `確定要刪除「${sticker.name}」(${sticker.id}) 嗎？此操作無法復原。`;
            document.getElementById('confirm-overlay').classList.add('show');
        }

        // 關閉確認 Modal
        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('show');
            pendingDeleteId = '';
        }

        // 執行刪除
        // 【遷移須知】改為 DELETE /api/stickers/:id
        function executeDelete() {
            if (!pendingDeleteId) return;

            const sticker = stickerData.find(s => s.id === pendingDeleteId);
            const name = sticker ? sticker.name : pendingDeleteId;

            // 從陣列移除
            stickerData = stickerData.filter(s => s.id !== pendingDeleteId);
            saveToLocalStorage();

            closeConfirm();
            renderAll();
            showToast('🗑️', `已刪除「${name}」`);
        }


        // ===== 圖片上傳處理 =====

        // 監聽檔案選擇
        function handleFileSelect(file) {
            if (!file) return;

            if (file.size > 1024 * 1024) {
                showToast('⚠️', '圖片大小不可超過 1MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImageBase64 = e.target.result;
                const area = document.getElementById('upload-area');
                area.classList.add('has-image');
                area.innerHTML = `
                    <img src="${uploadedImageBase64}" alt="預覽">
                    <input type="file" id="input-file" accept="image/*">
                `;
                // 重新綁定事件
                document.getElementById('input-file').addEventListener('change', (ev) => {
                    handleFileSelect(ev.target.files[0]);
                });
            };
            reader.readAsDataURL(file);
        }

        // 清空上傳狀態
        function clearUpload() {
            uploadedImageBase64 = '';
            const area = document.getElementById('upload-area');
            area.classList.remove('has-image');
            area.innerHTML = `
                <div class="upload-icon">📤</div>
                <div class="upload-text">點擊或拖曳上傳圖片</div>
                <input type="file" id="input-file" accept="image/*">
            `;
            document.getElementById('input-file').addEventListener('change', (e) => {
                handleFileSelect(e.target.files[0]);
            });
        }


        // ===== 自訂分類切換 =====
        document.getElementById('input-category').addEventListener('change', (e) => {
            const isCustom = e.target.value === '__custom__';
            document.getElementById('custom-category-group').style.display = isCustom ? 'block' : 'none';
            if (isCustom) {
                document.getElementById('input-custom-category').focus();
            }
        });


        // ===== 確認刪除按鈕綁定 =====
        document.getElementById('btn-confirm-delete').addEventListener('click', executeDelete);


        // ===== 圖片上傳事件綁定 =====
        document.getElementById('input-file').addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // 拖曳上傳
        const uploadArea = document.getElementById('upload-area');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--accent-green)';
            uploadArea.style.background = 'var(--accent-green-dim)';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });


        // ===== Toast =====
        function showToast(icon, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-icon').textContent = icon;
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }


        // ===== 匯出 JSON（方便管理者複製到 stickers.json） =====
        // 在 console 輸入 exportJSON() 即可
        function exportJSON() {
            // 移除 _preview（base64）欄位再匯出
            const clean = stickerData.map(({ _preview, ...rest }) => rest);
            const json = JSON.stringify(clean, null, 2);
            console.log('===== stickers.json =====');
            console.log(json);

            // 也複製到剪貼簿
            navigator.clipboard.writeText(json).then(() => {
                showToast('📋', 'JSON 已複製到剪貼簿！可貼到 stickers.json');
            }).catch(() => {
                showToast('📋', 'JSON 已輸出到 Console');
            });

            return json;
        }

        // 也掛到 window 方便 console 呼叫
        window.exportJSON = exportJSON;


        // ===== Enter 鍵快速新增 =====
        document.getElementById('input-name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addSticker();
        });


        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', loadStickers);
    </script>

    <!-- ===== Hamburger Menu Logic ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerBtn = document.querySelector('.hamburger-btn');
            const navLinks = document.querySelector('.nav-links');
            
            if (hamburgerBtn && navLinks) {
                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    hamburgerBtn.classList.toggle('open');
                    navLinks.classList.toggle('active');
                });
                
                // Close menu when clicking outside
                document.addEventListener('click', (e) => {
                    if (navLinks.classList.contains('active') && !navLinks.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                        hamburgerBtn.classList.remove('open');
                        navLinks.classList.remove('active');
                    }
                });
            }
        });
    </script>
</body>
