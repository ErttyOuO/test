<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配對專區 - 尋找專屬保險員</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <style>
        :root {
            --bg-color: #f7f7fb;
            --surface-color: #fbfbfe;
            --elevated-color: #efeeff;
            --input-bg: #f2f2ff;
            --sidebar-width: 300px;
            --text-dark: #1c1b2a;
            --text-muted: #5d5a7a;
            --blue-primary: #4c46d8;
            --blue-primary-strong: #3f3abf;
            --blue-text: #f5f5ff;
            --green-like: #22c55e;
            --red-pass: #ef4444;
            --border-color: #dbdaf5;
            --shadow-soft: 0 6px 18px rgba(35, 31, 94, 0.1);
            --header-grad-start: #dedcff;
            --header-grad-end: #c9c5ff;
            --user-msg-bg: #dedcff;
        }

        body[data-theme="dark"] {
            --bg-color: #0d1021;
            --surface-color: #131735;
            --elevated-color: #1a1f46;
            --input-bg: #111533;
            --text-dark: #ecebff;
            --text-muted: #a6a3cc;
            --blue-primary: #7b77ff;
            --blue-primary-strong: #9a97ff;
            --blue-text: #0d1021;
            --green-like: #22c55e;
            --red-pass: #f87171;
            --border-color: #2a3061;
            --shadow-soft: 0 8px 20px rgba(4, 6, 20, 0.42);
            --header-grad-start: #252c63;
            --header-grad-end: #363e85;
            --user-msg-bg: #242b66;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .match-page-shell {
            display: flex;
            height: calc(100vh - 54px);
            overflow: hidden;
        }

        /* ----- 左側 Sidebar ----- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-soft);
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px;
            background: linear-gradient(135deg, var(--header-grad-start), var(--header-grad-end));
            color: var(--blue-text);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn {
            width: 100%;
            background-color: var(--elevated-color);
            color: var(--blue-text);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: var(--blue-primary);
            color: white;
        }

        .nav-btn.active {
            background-color: var(--blue-primary-strong);
            color: var(--blue-text);
        }

        .favorites-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .favorites-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .liked-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 收藏清單項目 */
        .liked-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--elevated-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .liked-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #bae6fd, var(--blue-primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--blue-text);
            flex-shrink: 0;
        }

        .liked-info {
            flex: 1;
            overflow: hidden;
        }

        .liked-name {
            font-weight: bold;
            font-size: 15px;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .liked-company {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .connect-btn {
            background-color: var(--blue-primary);
            color: var(--blue-text);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .connect-btn:hover {
            transform: scale(1.05);
        }

        .empty-favorites {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 30px;
            line-height: 1.6;
        }

        /* ----- 右側 Main Content ----- */
        .main-content {
            flex: 1;
            position: relative;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
        }

        .view-section {
            width: 100%;
            height: 100%;
            display: none;
            /* JS 切換 */
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .view-section.active {
            display: flex;
        }

        /* === Matchmaker View === */
        .match-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-stack {
            position: relative;
            width: 320px;
            height: 500px;
            perspective: 1000px;
        }

        .agent-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--surface-color);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: grab;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: 50% 100%;
            will-change: transform;
        }

        .agent-card:active {
            cursor: grabbing;
        }

        /* 卡片照片區 */
        .card-photo {
            flex: 1;
            background: linear-gradient(to bottom, #bae6fd, var(--blue-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: var(--blue-text);
            font-weight: bold;
            position: relative;
        }

        /* 卡片資訊區 */
        .card-info {
            background: var(--surface-color);
            color: var(--text-dark);
            padding: 20px;
            height: 180px;
        }

        .agent-name-display {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-name-display .verified {
            color: transparent;
            background-image: linear-gradient(45deg, #f00, #ff8000, #ff0, #00C800, #00f, #4b0082, #ee82ee);
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 16px;
        }

        .verified-badge-hidden {
            display: none !important;
        }

        .agent-tags {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .agent-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 滑動提示標籤 (Like / Nope) */
        .stamp {
            position: absolute;
            top: 40px;
            padding: 5px 15px;
            border: 4px solid;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0;
            z-index: 10;
        }

        .stamp-like {
            left: 20px;
            color: var(--green-like);
            border-color: var(--green-like);
            transform: rotate(-15deg);
        }

        .stamp-nope {
            right: 20px;
            color: var(--red-pass);
            border-color: var(--red-pass);
            transform: rotate(15deg);
        }

        /* 底部按鈕區 */
        .action-buttons {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .action-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--surface-color);
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .btn-pass {
            color: var(--red-pass);
        }

        .btn-like {
            color: var(--green-like);
        }

        .empty-deck {
            position: absolute;
            text-align: center;
            color: var(--text-muted);
            font-size: 18px;
            z-index: -1;
        }

        /* === Chat View === */
        #view-chat {
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            background-color: var(--surface-color);
            height: 100%;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--header-grad-start), var(--header-grad-end));
            color: var(--blue-text);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-soft);
        }

        .chat-header-title {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-history {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-color);
        }

        .message {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            word-wrap: break-word;
        }

        .message.agent {
            background-color: var(--surface-color);
            color: var(--blue-text);
            align-self: flex-start;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background-color: var(--user-msg-bg);
            color: var(--blue-text);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px 30px;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s;
            background: var(--input-bg);
        }

        .chat-input:focus {
            border-color: var(--blue-primary);
            background: var(--surface-color);
        }

        .send-btn {
            background-color: var(--blue-primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            background-color: var(--blue-primary-strong);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transform: translateX(2px);
        }

        /* 檔案附加按鈕 */
        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .attach-btn:hover {
            color: var(--blue-primary);
        }

        .attach-btn svg {
            width: 24px;
            height: 24px;
        }

        .msg-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        .msg-file {
            display: inline-block;
            margin-top: 5px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            color: inherit;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- 主站 Header -->
    <header>
        <a href="index.html" class="logo-section">
            <img src="../assets/images/logo.png" alt="InsureTech Logo">
            <span>百保袋</span>
        </a>
        <nav>
            <ul>
                <li><a href="consulting.html">保險諮詢</a></li>
                <li><a href="dm.html">保單目錄</a></li>
                <li><a href="budget.html">費用預算</a></li>
                <li><a href="policy.html">智慧保單</a></li>
                <li><a href="community.html">匿名社群</a></li>
            </ul>
        </nav>
        <button class="hamburger-btn" id="hamburger-toggle">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="match-page-shell">
    <!-- 左側邊欄 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span>🛡️</span> 保險配對平台
        </div>

        <div class="nav-buttons">
            <button class="nav-btn active" id="btn-nav-matchmaker" onclick="switchView('matchmaker')">
                <span>🏠</span> 配對主頁
            </button>
            <button class="nav-btn" onclick="window.location.href='user_group.html'">
                <span>👥</span> 多人聊天
            </button>
        </div>

        <div class="favorites-section">
            <div class="favorites-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>❤️ 我的收藏 (<span id="likedCount">0</span>)</span>
                <button onclick="clearFavorites()"
                    style="font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid #cbd5e1; background: transparent; color: #64748b; cursor: pointer; transition: 0.2s;"
                    onmouseover="this.style.color='#ef4444'; this.style.borderColor='#ef4444'"
                    onmouseout="this.style.color='#64748b'; this.style.borderColor='#cbd5e1'">清空</button>
            </div>
            <div id="liked-list" class="liked-list">
                <div class="empty-favorites">
                    尚未收藏任何保險員。<br>在右側配對區向右滑動卡片<br>即可加入您的專屬儲藏庫！
                </div>
            </div>
        </div>
    </div>

    <!-- 右側主內容區 -->
    <div class="main-content">

        <!-- View 1: Matchmaker -->
        <div id="view-matchmaker" class="view-section active">
            <div class="match-container">
                <div class="empty-deck">
                    <p>目前沒有更多保險員了！</p>
                    <p style="font-size:14px; opacity:0.7">請稍後再回來查看。</p>
                    <button onclick="resetMatchmaker()"
                        style="margin-top: 20px; padding: 10px 20px; border-radius: 20px; border: none; background: var(--blue-primary); color: var(--blue-text); font-weight: bold; cursor: pointer; transition: transform 0.1s;"
                        onmouseover="this.style.transform='scale(1.05)'"
                        onmouseout="this.style.transform='scale(1)'">重新載入卡片</button>
                </div>


                <div class="card-stack" id="card-stack">
                    <!-- 卡片由 JS 動態生成 -->
                </div>

                <!-- 配對結束後選擇聯繫保險員 Modal -->
                <style>
                /* Modal Overlay 置中樣式 */
                #choose-agent-modal.modal-overlay {
                    position: fixed;
                    top: 0; left: 0; right: 0; bottom: 0;
                    width: 100vw; height: 100vh;
                    background: rgba(0,0,0,0.35);
                    z-index: 9999;
                    display: none;
                    align-items: center;
                    justify-content: center;
                }
                #choose-agent-modal .modal-content {
                    background: var(--surface-color);
                    border-radius: 18px;
                    box-shadow: var(--shadow-soft);
                    padding: 36px 28px 28px 28px;
                    max-width: 860px;
                    width: min(92vw, 860px);
                    max-height: 82vh;
                    margin: 0;
                    position: relative;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    overflow: hidden;
                }
                #choose-agent-modal .modal-title {
                    font-size: 28px;
                    font-weight: bold;
                    margin-bottom: 20px;
                    color: var(--blue-text);
                }
                #choose-agent-list {
                    width: 100%;
                    overflow-y: auto;
                    padding-right: 4px;
                }
                #choose-agent-modal .choose-agent-grid {
                    display: grid;
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    gap: 16px;
                }
                #choose-agent-modal .choose-agent-card {
                    border: 1px solid var(--border-color);
                    background: var(--elevated-color);
                    border-radius: 14px;
                    padding: 18px 14px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                    cursor: pointer;
                    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
                }
                #choose-agent-modal .choose-agent-card:hover {
                    transform: translateY(-2px);
                    border-color: var(--blue-primary);
                    box-shadow: 0 5px 12px rgba(76, 70, 216, 0.16);
                }
                #choose-agent-modal .choose-agent-avatar {
                    width: 70px;
                    height: 70px;
                    border-radius: 50%;
                    margin-bottom: 12px;
                    background: linear-gradient(135deg, var(--header-grad-start), var(--header-grad-end));
                    color: var(--blue-text);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 28px;
                    font-weight: bold;
                    background-size: cover;
                    background-position: center;
                }
                #choose-agent-modal .choose-agent-name {
                    font-size: 21px;
                    font-weight: 700;
                    color: var(--text-dark);
                    margin-bottom: 4px;
                }
                #choose-agent-modal .choose-agent-company {
                    font-size: 15px;
                    color: var(--text-muted);
                    margin-bottom: 14px;
                }
                #choose-agent-modal .choose-agent-contact-btn {
                    width: 100%;
                    border: none;
                    border-radius: 999px;
                    padding: 11px 12px;
                    background: var(--blue-primary);
                    color: var(--blue-text);
                    font-weight: 800;
                    font-size: 16px;
                    cursor: pointer;
                }
                #choose-agent-modal .choose-agent-alt {
                    width: 100%;
                    margin-top: 18px;
                    border-top: 1px dashed var(--border-color);
                    padding-top: 16px;
                    text-align: left;
                    color: var(--text-muted);
                    font-size: 13px;
                }
                #choose-agent-modal .choose-agent-alt-title {
                    margin-bottom: 10px;
                    color: var(--text-muted);
                    font-size: 13px;
                    font-weight: 600;
                }
                #choose-agent-modal .choose-agent-alt-row {
                    display: grid;
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    gap: 10px;
                }
                #choose-agent-modal .choose-agent-alt-btn {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    border: 1px solid var(--border-color);
                    background: var(--elevated-color);
                    color: var(--text-dark);
                    border-radius: 12px;
                    padding: 12px 12px;
                    cursor: pointer;
                    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
                    text-align: left;
                }
                #choose-agent-modal .choose-agent-alt-btn:hover {
                    transform: translateY(-1px);
                    border-color: var(--blue-primary);
                    box-shadow: var(--shadow-soft);
                }
                #choose-agent-modal .choose-agent-alt-icon {
                    width: 32px;
                    height: 32px;
                    border-radius: 999px;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    background: var(--blue-primary);
                    color: var(--blue-text);
                    font-size: 15px;
                    flex-shrink: 0;
                }
                #choose-agent-modal .choose-agent-alt-text {
                    display: flex;
                    flex-direction: column;
                    line-height: 1.2;
                }
                #choose-agent-modal .choose-agent-alt-text strong {
                    font-size: 14px;
                    color: var(--text-dark);
                }
                #choose-agent-modal .choose-agent-alt-text span {
                    margin-top: 2px;
                    font-size: 12px;
                    color: var(--text-muted);
                }
                @media (max-width: 640px) {
                    #choose-agent-modal .modal-content {
                        width: 94vw;
                        padding: 28px 18px 18px 18px;
                    }
                    #choose-agent-modal .modal-title {
                        font-size: 22px;
                    }
                    #choose-agent-modal .choose-agent-grid {
                        grid-template-columns: 1fr;
                    }
                    #choose-agent-modal .choose-agent-name {
                        font-size: 18px;
                    }
                    #choose-agent-modal .choose-agent-company {
                        font-size: 14px;
                    }
                    #choose-agent-modal .choose-agent-alt-row {
                        grid-template-columns: 1fr;
                    }
                }
                #choose-agent-modal .modal-close {
                    position: absolute;
                    top: 12px; right: 16px;
                    background: none;
                    border: none;
                    font-size: 24px;
                    color: var(--text-muted);
                    cursor: pointer;
                }
                </style>
                <div id="choose-agent-modal" class="modal-overlay">
                    <div class="modal-content">
                        <button class="modal-close" onclick="closeChooseAgentModal()">×</button>
                        <div class="modal-title">選擇要聯繫的保險員</div>
                        <div id="choose-agent-list"></div>
                        <div class="choose-agent-alt">
                            <div class="choose-agent-alt-title">其他選項</div>
                            <div class="choose-agent-alt-row">
                                <button type="button" class="choose-agent-alt-btn" onclick="restartMatching()">
                                    <span class="choose-agent-alt-icon"><i class="ph ph-arrows-clockwise"></i></span>
                                    <span class="choose-agent-alt-text">
                                        <strong>重新配對</strong>
                                        <span>刷新卡片後再挑一次</span>
                                    </span>
                                </button>
                                <button type="button" class="choose-agent-alt-btn" onclick="goToGroupChatDialog()">
                                    <span class="choose-agent-alt-icon"><i class="ph ph-users-three"></i></span>
                                    <span class="choose-agent-alt-text">
                                        <strong>試試多人聊天</strong>
                                        <span>直接前往群組對話框</span>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn btn-pass" onclick="triggerAction('left')">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                    <button class="action-btn btn-like" onclick="triggerAction('right')">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>


        <!-- View 2: Chat Interface -->
        <div id="view-chat" class="view-section">
            <div class="chat-header" style="justify-content: space-between;">
                <div class="chat-header-title" style="display: flex; align-items: center; gap: 10px;">
                    <div id="chat-header-avatar"
                        style="width: 32px; height: 32px; background-color: var(--bg-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; background-size: cover; background-position: center; color: var(--blue-text);">
                        專</div>
                    <div style="font-size: 18px; font-weight: bold;">
                        與 <span id="chat-agent-name">專員</span> 諮詢中
                    </div>
                </div>
                <button id="chat-favorite-btn"
                    style="background: none; border: none; font-size: 24px; cursor: pointer; color: #cbd5e1; transition: color 0.2s;"
                    title="加入收藏">
                    🤍
                </button>
            </div>

            <div class="chat-history" id="chatHistory">
                <div class="message agent">
                    您好！很高興為您服務，請問今天想了解哪個方面的保險規劃呢？
                    <div class="message-time">系統訊息</div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="file" id="fileInput" hidden>
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="附加檔案或圖片">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13">
                        </path>
                    </svg>
                </button>
                <input type="text" id="messageInput" class="chat-input" placeholder="輸入訊息詢問保險員..."
                    onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>

    </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==========================================
        // 1. SPA Navigation Logic
        // ==========================================
        function switchView(viewName, agentName = null) {
            // Hide all views
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));

            if (viewName === 'matchmaker') {
                document.getElementById('view-matchmaker').classList.add('active');
            } else if (viewName === 'chat') {
                document.getElementById('view-chat').classList.add('active');

                const headerAvatar = document.getElementById('chat-header-avatar');
                const favBtn = document.getElementById('chat-favorite-btn');
                let targetFavObj = null;

                if (agentName) {
                    document.getElementById('chat-agent-name').innerText = agentName;

                    // 尋找對應的保險員頭像
                    const matchedAgent = agents.find(a => a.name === agentName);
                    if (matchedAgent) {
                        targetFavObj = matchedAgent;
                        if (matchedAgent.avatarUrl) {
                            headerAvatar.innerText = '';
                            headerAvatar.style.backgroundImage = `url(${matchedAgent.avatarUrl})`;
                        } else {
                            headerAvatar.innerText = matchedAgent.avatar;
                            headerAvatar.style.backgroundImage = 'none';
                        }
                    }
                }

                if (targetFavObj) {
                    favBtn.style.display = 'block';
                    const isLiked = likedAgents.find(a => a.id === targetFavObj.id);
                    if (isLiked) {
                        favBtn.innerText = '❤️';
                        favBtn.style.color = 'var(--blue-primary)';
                        favBtn.title = "取消收藏";
                        favBtn.onclick = () => {
                            removeFromFavorites(targetFavObj.id);
                            switchView('chat', agentName); // re-render header
                        };
                    } else {
                        favBtn.innerText = '🤍';
                        favBtn.style.color = '#cbd5e1';
                        favBtn.title = "加入收藏";
                        favBtn.onclick = () => {
                            addToFavorites(targetFavObj);
                            switchView('chat', agentName); // re-render header
                        };
                    }
                } else {
                    favBtn.style.display = 'none';
                }
            }
        }

        // ==========================================
        // 2. Matchmaker Card Swipe Logic
        // ==========================================

        function createDefaultAgents() {
            return [
                { id: 1, name: "王保險", age: 42, company: "國泰人壽", desc: "超棒棒，大家的榜樣", avatar: "王", isVerified: false },
                { id: 2, name: "陳保險", age: 28, company: "富邦人壽", desc: "有潛力，穩定成長", avatar: "陳", isVerified: false },
                { id: 3, name: "林保險", age: 35, company: "安泰人壽", desc: "持續努力，突破自我", avatar: "林", isVerified: false },
                { id: 4, name: "蔡保險", age: 31, company: "南山人壽", desc: "一步一腳印，扎實邁進", avatar: "蔡", isVerified: false },
                { id: 5, name: "龔保險", age: 45, company: "新光人壽", desc: "不屈不撓，漸入佳境", avatar: "龔", isVerified: false }
            ];
        }

        let agents = createDefaultAgents();

        // Fetch real agent profile to be at the top of the deck
        function loadAgents() {
            fetch('/api/profile')
                .then(res => res.json())
                .then(data => {
                    const name = data.personal.name || "專員";
                    const ageNum = parseInt(data.personal.age) || 30;

                    const realAgent = {
                        id: 999, // special id
                        name: name,
                        age: ageNum,
                        company: data.personal.company || "保險公司",
                        desc: `${data.personal.experience}經驗 · ${data.personal.position}`,
                        avatar: name.charAt(0),
                        avatarUrl: data.personal.avatar || null,
                        isVerified: !!data.personal.isVerified
                    };

                    // Add to start of array (will be drawn last in HTML so it's on top of stack)
                    agents.unshift(realAgent);
                    initCards();
                })
                .catch(() => {
                    initCards();
                });
        }

        loadAgents();

        const stack = document.getElementById('card-stack');
        let cards = [];
        let likedAgents = JSON.parse(localStorage.getItem('likedAgents')) || [];
        let skippedAgentIds = JSON.parse(localStorage.getItem('skippedAgentIds')) || [];
        const urlParams = new URLSearchParams(window.location.search);
        const shouldApplyRandomMode = urlParams.get('mode') === 'random';
        let randomModeHandled = false;

        // Restore UI on load (now called inside fetch callback instead of here directly)
        // if (likedAgents.length > 0) {
        //    updateFavoritesUI();
        // }

        function initCards() {
            if (likedAgents.length > 0) {
                updateFavoritesUI();
            }
            // Get IDs of already processed agents
            const likedIds = likedAgents.map(a => a.id);
            const skippedIds = new Set(skippedAgentIds);

            let hasCard = false;
            for (let i = agents.length - 1; i >= 0; i--) {
                // Only create cards for agents not already liked or skipped
                if (!likedIds.includes(agents[i].id) && !skippedIds.has(agents[i].id)) {
                    createCard(agents[i]);
                    hasCard = true;
                }
            }
            setupDrag();

            if (!randomModeHandled && shouldApplyRandomMode) {
                randomModeHandled = true;
                applyPendingRandomMatch();
            }

            // 若沒有卡片可滑，且收藏有保險員，彈出選擇聯繫 modal
            if (!hasCard && likedAgents.length > 0) {
                showChooseAgentModal();
            }
        }

        function applyPendingRandomMatch() {
            const raw = sessionStorage.getItem('pendingRandomHumanAgent');
            let pending = null;
            if (raw) {
                try {
                    pending = JSON.parse(raw);
                } catch (e) {
                    pending = null;
                }
            }

            // Clean up URL and temporary state once consumed.
            sessionStorage.removeItem('pendingRandomHumanAgent');
            if (window.history && window.history.replaceState) {
                window.history.replaceState({}, document.title, 'user_match.html');
            }

            const candidates = agents.filter(a => !likedAgents.find(l => l.id === a.id));
            if (!candidates.length) return;

            let pickedAgent = null;
            if (pending && pending.name) {
                pickedAgent = candidates.find(a => a.name === pending.name) || null;
            }
            if (!pickedAgent) {
                const idx = Math.floor(Math.random() * candidates.length);
                pickedAgent = candidates[idx];
            }

            if (!pickedAgent) return;

            addToFavorites(pickedAgent);
            // 進入配對頁後直接切到該保險員對話（仍在同一個配對頁面）
            switchView('chat', pickedAgent.name);

            const chatMessages = document.getElementById('chatHistory');
            if (chatMessages) {
                chatMessages.innerHTML = `
                    <div class="message agent">
                        已為您隨機配對 <strong>${pickedAgent.name}</strong>，您可以直接開始諮詢。
                        <div class="message-time">系統訊息</div>
                    </div>
                `;
            }
        }
        // 彈出選擇聯繫保險員 Modal
        function showChooseAgentModal() {
            const modal = document.getElementById('choose-agent-modal');
            const list = document.getElementById('choose-agent-list');
            list.innerHTML = '<div class="choose-agent-grid"></div>';
            const grid = list.querySelector('.choose-agent-grid');
            likedAgents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'choose-agent-card';
                const avatarHtml = agent.avatarUrl
                    ? `<div class="choose-agent-avatar" style="background-image:url('${agent.avatarUrl}'); color: transparent;"></div>`
                    : `<div class="choose-agent-avatar">${agent.avatar}</div>`;
                card.innerHTML = `
                    ${avatarHtml}
                    <div class="choose-agent-name">${agent.name}</div>
                    <div class="choose-agent-company">${agent.company}</div>
                    <button class="choose-agent-contact-btn" type="button">聯繫</button>
                `;
                const openChat = () => {
                    closeChooseAgentModal();
                    switchView('chat', agent.name);
                };
                card.addEventListener('click', openChat);
                card.querySelector('.choose-agent-contact-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openChat();
                });
                grid.appendChild(card);
            });
            modal.style.display = 'flex';
        }

        function closeChooseAgentModal() {
            document.getElementById('choose-agent-modal').style.display = 'none';
        }

        function goToGroupChatDialog() {
            window.location.href = 'user_group.html?openChat=1';
        }

        function restartMatching() {
            skippedAgentIds = [];
            localStorage.setItem('skippedAgentIds', JSON.stringify(skippedAgentIds));
            closeChooseAgentModal();
            resetMatchmaker();
        }

        function resetMatchmaker() {
            stack.innerHTML = '';
            cards = [];
            currentCard = null;
            isDragging = false;
            agents = createDefaultAgents(); // Restore the default 5 agents

            // Remove agents that have already been processed (liked or skipped)
            const likedIds = likedAgents.map(a => a.id);
            const skippedIds = new Set(skippedAgentIds);
            agents = agents.filter(a => !likedIds.includes(a.id) && !skippedIds.has(a.id));

            loadAgents(); // Fetch the real agent and re-initialize cards
        }

        function markAgentAsSkipped(agentId) {
            if (!skippedAgentIds.includes(agentId)) {
                skippedAgentIds.push(agentId);
                localStorage.setItem('skippedAgentIds', JSON.stringify(skippedAgentIds));
            }
        }

        function createCard(agent) {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.dataset.id = agent.id;

            card.innerHTML = `
            <div class="card-photo" style="${agent.avatarUrl ? `background-image: url('${agent.avatarUrl}'); background-size: cover; background-position: center; color: transparent;` : ''}">
                ${agent.avatarUrl ? '' : agent.avatar}
                <div class="stamp stamp-like">喜歡</div>
                <div class="stamp stamp-nope">跳過</div>
            </div>
            <div class="card-info">
                <div class="agent-name-display">
                    ${agent.name} <span style="font-size:18px; font-weight:normal;">${agent.age}</span>
                    <span class="verified ${agent.isVerified ? '' : 'verified-badge-hidden'}">✔</span>
                </div>
                <div class="agent-tags">${agent.company}</div>
                <div class="agent-desc">${agent.desc}</div>
            </div>
            `;
            stack.appendChild(card);
            cards.push(card);
        }

        let isDragging = false;
        let startX = 0, currentX = 0;
        let currentCard = null;

        function setupDrag() {
            if (cards.length === 0) return;
            currentCard = cards[cards.length - 1];

            currentCard.querySelector('.stamp-like').style.opacity = 0;
            currentCard.querySelector('.stamp-nope').style.opacity = 0;

            currentCard.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);

            currentCard.addEventListener('touchstart', dragStart, { passive: true });
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('touchend', dragEnd);
        }

        function removeEvents() {
            if (!currentCard) return;
            currentCard.removeEventListener('mousedown', dragStart);
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);

            currentCard.removeEventListener('touchstart', dragStart);
            document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('touchend', dragEnd);
        }

        function dragStart(e) {
            if (!currentCard) return;
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            currentCard.style.transition = 'none';
        }

        function dragMove(e) {
            if (!isDragging || !currentCard) return;
            currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX;

            const rotate = currentX * 0.05;
            currentCard.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

            const opacity = Math.min(Math.abs(currentX) / 100, 1);
            if (currentX > 0) {
                currentCard.querySelector('.stamp-like').style.opacity = opacity;
                currentCard.querySelector('.stamp-nope').style.opacity = 0;
            } else {
                currentCard.querySelector('.stamp-nope').style.opacity = opacity;
                currentCard.querySelector('.stamp-like').style.opacity = 0;
            }
        }

        function dragEnd(e) {
            if (!isDragging || !currentCard) return;
            isDragging = false;
            const threshold = 100;
            currentCard.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

            if (currentX > threshold) {
                swipeOut('right');
            } else if (currentX < -threshold) {
                swipeOut('left');
            } else {
                currentCard.style.transform = `translateX(0px) rotate(0deg)`;
                currentCard.querySelector('.stamp-like').style.opacity = 0;
                currentCard.querySelector('.stamp-nope').style.opacity = 0;
            }
            currentX = 0;
        }

        function swipeOut(direction) {
            if (!currentCard) return;
            removeEvents();

            const offset = direction === 'right' ? window.innerWidth : -window.innerWidth;
            const rotate = direction === 'right' ? 30 : -30;

            if (direction === 'right') {
                currentCard.querySelector('.stamp-like').style.opacity = 1;
            } else {
                currentCard.querySelector('.stamp-nope').style.opacity = 1;
            }

            currentCard.style.transform = `translateX(${offset}px) rotate(${rotate}deg)`;
            currentCard.style.opacity = 0;

            setTimeout(() => {
                const swipedId = parseInt(currentCard.dataset.id);
                const agentData = agents.find(a => a.id === swipedId);

                currentCard.remove();
                cards.pop();
                currentCard = null;

                if (direction === 'right') {
                    addToFavorites(agentData);
                } else {
                    markAgentAsSkipped(swipedId);
                }

                setupDrag();

                // 最後一張滑完時，跳出中央可聯繫保險員選單
                if (cards.length === 0 && likedAgents.length > 0) {
                    showChooseAgentModal();
                }
            }, 300);
        }

        function triggerAction(direction) {
            if (!currentCard) return;
            currentX = direction === 'right' ? 150 : -150;
            swipeOut(direction);
        }

        // ==========================================
        // 3. Favorites Sidebar Logic
        // ==========================================
        function addToFavorites(agent) {
            if (!likedAgents.find(a => a.id === agent.id)) {
                likedAgents.push(agent);
                localStorage.setItem('likedAgents', JSON.stringify(likedAgents));
                updateFavoritesUI();
            }
        }

        function removeFromFavorites(id) {
            likedAgents = likedAgents.filter(a => a.id !== id);
            localStorage.setItem('likedAgents', JSON.stringify(likedAgents));
            updateFavoritesUI();
        }

        function updateFavoritesUI() {
            document.getElementById('likedCount').innerText = likedAgents.length;
            const listContainer = document.getElementById('liked-list');

            if (likedAgents.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-favorites">
                        尚未收藏任何保險員或群組。<br>在右側配對區向右滑動卡片<br>即可加入您的專屬儲藏庫！
                    </div>`;
                return;
            }

            listContainer.innerHTML = '';

            likedAgents.forEach(agent => {
                const div = document.createElement('div');
                div.className = 'liked-item';

                let connectBtnHtml;
                if (agent.isGroup) {
                    connectBtnHtml = `<button class="connect-btn" onclick="joinGroup('${agent.id}', '${agent.name}')">進入</button>`;
                } else if (agent.name === '林保險' || agent.id === 999) {
                    connectBtnHtml = `<button class="connect-btn" onclick="switchView('chat', '${agent.name}')">聯繫</button>`;
                } else {
                    connectBtnHtml = `<button class="connect-btn" disabled style="background-color: #e2e8f0; border-color: #e2e8f0; color: #94a3b8; cursor: not-allowed;">未聯繫</button>`;
                }

                let avatarHtml = `<div class="liked-avatar">${agent.avatar}</div>`;
                if (agent.avatarUrl) {
                    avatarHtml = `<div class="liked-avatar" style="background-image: url('${agent.avatarUrl}'); background-size: cover; background-position: center; color: transparent;"></div>`;
                }

                div.innerHTML = `
                    ${avatarHtml}
                    <div class="liked-info" style="flex: 1; display: flex; flex-direction: column;">
                        <div class="liked-name">${agent.name} <span class="verified-badge ${agent.isVerified && !agent.isGroup ? '' : 'verified-badge-hidden'}">✔</span></div>
                        <div class="liked-company">${agent.company}</div>
                    </div>
                    ${connectBtnHtml}
                `;
                listContainer.appendChild(div);
            });
        }

        function clearFavorites() {
            if (confirm("確定要清空所有收藏嗎？這會讓你可以重新配對所有保險員。")) {
                likedAgents = [];
                localStorage.setItem('likedAgents', JSON.stringify(likedAgents));
                skippedAgentIds = [];
                localStorage.setItem('skippedAgentIds', JSON.stringify(skippedAgentIds));
                closeChooseAgentModal();
                updateFavoritesUI();
                resetMatchmaker();
            }
        }

        // ==========================================
        // 4. Socket.io Chat Logic
        // ==========================================
        const historyContainer = document.getElementById('chatHistory');
        const messageInput = document.getElementById('messageInput');
        let socket;

        try {
            socket = io('http://localhost:3001');
            socket.emit('register', { role: 'user', userId: 'superuser' });

            socket.on('sync_user_history', (data) => {
                const historyData = data.history || [];
                historyContainer.innerHTML = '';
                historyData.forEach(msg => {
                    const dateObj = new Date(msg.timestamp);
                    appendMessage(msg.role, msg.text, dateObj, msg.file);
                });
            });

            socket.on('new_reply_from_agent', (data) => {
                appendMessage('agent', data.text, new Date(data.timestamp), data.file);
            });

        } catch (e) {
            console.warn("Socket.io not found. Please start the node server.", e);
        }

        // Handle File Selection Preview Logic (Optional UX enhancement)
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                document.getElementById('messageInput').placeholder = `已選擇檔案: ${fileName}`;
            }
        });

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            const file = fileInput.files[0];

            if (!text && !file) return;

            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const fileObj = {
                        name: file.name,
                        type: file.type,
                        data: e.target.result // base64 string
                    };

                    socket.emit('user_message', { text: text, file: fileObj });
                    appendMessage('user', text, new Date(), fileObj);
                    resetInput();
                };
                reader.readAsDataURL(file);
            } else {
                socket.emit('user_message', { text: text });
                appendMessage('user', text, new Date());
                resetInput();
            }
        }

        function resetInput() {
            messageInput.value = '';
            fileInput.value = '';
            messageInput.placeholder = "輸入訊息詢問保險員...";
        }

        function appendMessage(senderType, text, dateObj, fileObj = null, senderName = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${senderType}`;
            const timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let nameHtml = '';
            if (senderName && senderType !== 'user') {
                nameHtml = `<div style="font-size: 11px; font-weight: bold; margin-bottom: 4px; color: var(--blue-text); opacity: 0.8;">${senderName}</div>`;
            }

            let contentHtml = text ? `<div>${text}</div>` : '';

            if (fileObj) {
                if (fileObj.type.startsWith('image/')) {
                    contentHtml += `<img src="${fileObj.data}" class="msg-image" alt="attached image">`;
                } else {
                    contentHtml += `<a href="${fileObj.data}" download="${fileObj.name}" class="msg-file">📥 下載: ${fileObj.name}</a>`;
                }
            }

            msgDiv.innerHTML = `${nameHtml}${contentHtml}<div class="message-time">${timeString}</div>`;
            historyContainer.appendChild(msgDiv);
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }



        // Initialize App
        initCards();

    </script>

    <script src="../scripts/auth.js"></script>
    <script src="../scripts/script.js"></script>
</body>

</html>
