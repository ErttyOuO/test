<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保單評價 - 百保袋</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/policy_tab.css">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body class="site-transition-shell">
    <header>
        <a href="index.html" class="logo-section">
            <img src="../assets/images/logo.png" alt="百保袋 Logo">
            <span>百保袋</span>
        </a>
        <nav>
            <ul>
                <li><a href="consulting.html">保險諮詢</a></li>
                <li><a href="dm.html">保單目錄</a></li>
                <li><a href="policy_tab.html" class="active">保單評價</a></li>
                <li><a href="budget.html">費用預算</a></li>
                <li><a href="policy.html">智慧保單</a></li>
                <li><a href="community.html">匿名社群</a></li>
            </ul>
        </nav>
        <button class="hamburger-btn" id="hamburger-toggle" type="button" aria-label="開啟選單">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="mobile-nav-overlay" id="mobile-nav">
        <button class="mobile-nav-close" id="mobile-nav-close" type="button" aria-label="關閉選單">&times;</button>
        <div class="mobile-nav-content">
            <a href="index.html" class="mobile-nav-logo">
                <img src="../assets/images/logo.png" alt="百保袋 Logo">
                <span>百保袋</span>
            </a>
            <div class="mobile-nav-links">
                <a href="consulting.html">保險諮詢</a>
                <a href="dm.html">保單目錄</a>
                <a href="policy_tab.html">保單評價</a>
                <a href="budget.html">費用預算</a>
                <a href="policy.html">智慧保單</a>
                <a href="community.html">匿名社群</a>
            </div>
        </div>
    </div>

    <main>
        <div id="policy-module">
            <div class="policy-header">
                <h1 class="header-title">精選保單評價專區</h1>
                <p class="header-subtitle">探索數據與口碑，快速找到更適合你的保單方向</p>
                <div class="search-section">
                    <div class="search-wrapper">
                        <i class="fi fi-rr-search"></i>
                        <input type="text" id="policySearchInput" placeholder="搜尋保險公司、險種或關鍵字">
                        <button id="searchBtn" type="button">搜尋</button>
                    </div>
                </div>
                <nav class="filter-controls-bar">
                    <div class="center-controls">
                        <select id="sortSelect" aria-label="排序方式">
                            <option value="default">預設排序</option>
                            <option value="likes">最多人點讚</option>
                            <option value="comments">最高討論度</option>
                        </select>
                        <button id="filterFollowBtn" class="btn-toggle" type="button">
                            <i class="fi fi-rr-star"></i> 僅顯示已關注
                        </button>
                        <button id="filterToggleBtn" class="btn-toggle" type="button">進階篩選</button>
                    </div>
                    <div id="resultCount" class="result-count">共 0 筆結果</div>
                </nav>
            </div>

            <div class="policy-body">
                <section class="filter-section hidden" id="filterSection">
                    <div class="filter-group-container">
                        <div class="filter-group" id="companyFilters">
                            <span class="filter-label">保險公司</span>
                            <div class="checkbox-list"></div>
                        </div>
                        <div class="filter-group" id="categoryFilters">
                            <span class="filter-label">保險類別</span>
                            <div class="checkbox-list"></div>
                        </div>
                    </div>
                    <div class="filter-footer">
                        <button class="btn-clear" id="clearFiltersBtn" type="button">清除所有篩選條件</button>
                    </div>
                </section>
                <section id="policyContainer" class="policy-card-grid"></section>
            </div>

            <aside id="detailModal" class="modal">
                <div class="modal-content">
                    <button class="modal-close" onclick="window.closeDetailModal()">&times;</button>
                    <div id="modalBody"></div>
                </div>
            </aside>
        </div>
    </main>

    <div class="floating-widget">
        <div class="float-btn emergency" onclick="openClaimsModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v2" />
                <rect width="20" height="14" x="2" y="6" rx="2" />
                <path d="M12 10v6" />
                <path d="M9 13h6" />
            </svg>
            <span class="float-tooltip">理賠急救支援</span>
        </div>
    </div>

    <div class="modal-overlay" id="claims-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeClaimsModal()">×</button>
            <div class="modal-title">理賠急救支援</div>
            <p class="modal-desc">別擔心，請簡單描述您目前遇到的狀況，我們將協助您釐清後續步驟。</p>

            <div class="modal-form">
                <textarea placeholder="例如：剛發生車禍，有人受傷，警察還沒到，請問我現在該做什麼？"></textarea>
                <button class="modal-submit-btn" onclick="alert('我們已收到您的求救訊號，將立即分析並提供建議！')">請求支援</button>
            </div>
        </div>
    </div>

    <script src="../scripts/script.js"></script>
    <script src="../scripts/policy_tab.js"></script>
</body>

</html>
