<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貼圖商城 - 百保袋 InsureTech</title>
    <meta name="description" content="百保袋專屬貼圖商城，解鎖可愛的保險小助手貼圖">
    <style>
        /* ====================================================================
           【設計系統】白底版 — 沿用 sticker-shop.html 的商城佈局
           ==================================================================== */
        :root {
            --bg: #ffffff;
            --bg-card: #f8f9fa;
            --bg-card-hover: #f0f1f3;
            --border: rgba(0, 0, 0, 0.08);
            --text: #1a1a2e;
            --text-dim: #666;
            --accent: #9CC98D;
            --accent-dark: #7BB369;
            --accent-dim: rgba(156, 201, 141, 0.15);
            --gold: #e6a800;
            --gold-dim: rgba(230, 168, 0, 0.12);
            --red: #e53e3e;
            --red-dim: rgba(229, 62, 62, 0.1);
            --blue: #3182ce;
            --radius: 16px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 1rem;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-dark);
            background: var(--accent-dim);
        }

        .coins-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.8rem;
            background: var(--gold-dim);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--gold);
        }

        /* ===== Hero ===== */
        .shop-hero {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
            background: linear-gradient(135deg, rgba(156, 201, 141, 0.08) 0%, rgba(49, 130, 206, 0.05) 100%);
            border-bottom: 1px solid var(--border);
        }

        .shop-hero h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
        }

        .shop-hero p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* 統計條 */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .num {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-dark);
        }

        .stat-item .label {
            font-size: 0.72rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ===== 分類篩選 ===== */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.45rem 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
        }

        .filter-btn:hover {
            border-color: var(--accent-dark);
            color: var(--accent-dark);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
        }

        /* ===== 貼圖網格 ===== */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            max-width: 900px;
            margin: 1.5rem auto;
            padding: 0 1.5rem 3rem;
        }

        /* ===== 貼圖卡片 ===== */
        .shop-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            animation: fadeInUp 0.4s ease both;
        }

        .shop-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .shop-card.unlocked {
            border-color: rgba(156, 201, 141, 0.35);
        }

        .shop-card.unlocked::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主圖區域 */
        .card-img-area {
            width: 80px;
            height: 80px;
            margin: 0 auto 0.6rem;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(156, 201, 141, 0.12), rgba(49, 130, 206, 0.08));
            position: relative;
            transition: filter 0.3s;
        }

        .card-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-img-area .placeholder {
            font-size: 2.5rem;
        }

        /* Locked blur */
        .shop-card.locked .card-img-area {
            filter: blur(2px) grayscale(0.3);
        }

        .shop-card.locked:hover .card-img-area {
            filter: blur(0px) grayscale(0);
        }

        /* VIP tag */
        .vip-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--gold-dim);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
        }

        /* Emoji badge */
        .emoji-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 24px;
            height: 24px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
        }

        .card-name {
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
        }

        .card-desc {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 1.8em;
        }

        .card-category {
            font-size: 0.6rem;
            color: var(--accent-dark);
            margin-top: 0.3rem;
            margin-bottom: 0.4rem;
        }

        /* Unlock button */
        .unlock-btn {
            width: 100%;
            padding: 0.45rem;
            border: none;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .unlock-btn.buy {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
        }

        .unlock-btn.buy:hover {
            transform: translateY(-1px);
        }

        .unlock-btn.owned {
            background: var(--accent-dim);
            color: var(--accent-dark);
            cursor: default;
        }

        .unlock-btn.vip-only {
            background: var(--gold-dim);
            color: var(--gold);
            cursor: not-allowed;
        }

        /* ===== 解鎖 Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-emoji {
            font-size: 3rem;
            margin-bottom: 0.6rem;
        }

        .modal-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .modal-desc {
            font-size: 0.82rem;
            color: var(--text-dim);
            margin-bottom: 1.2rem;
        }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .modal-btn.coins {
            background: linear-gradient(135deg, var(--gold), #d4a017);
            color: #fff;
        }

        .modal-btn.coins:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-btn.ad {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
        }

        .modal-btn.cancel {
            background: var(--bg-card);
            color: var(--text-dim);
        }

        .coin-warn {
            font-size: 0.72rem;
            color: var(--red);
            display: none;
            margin-bottom: 0.5rem;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: #1a1a2e;
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 14px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== Animations ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popUnlock {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.25);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes confettiPop {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: scale(1.5) rotate(360deg) translateY(-30px);
                opacity: 0;
            }
        }

        .shop-card.just-unlocked .card-img-area {
            animation: popUnlock 0.5s ease;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: confettiPop 0.8s ease forwards;
            pointer-events: none;
        }

        /* ===== Empty State ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-dim);
            font-size: 0.72rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            margin-top: auto;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .shop-hero h1 {
                font-size: 1.3rem;
            }

            .stats-row {
                gap: 1rem;
            }

            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                padding: 0 1rem 2rem;
            }

            .card-img-area {
                width: 60px;
                height: 60px;
            }

            .emoji-badge {
                width: 18px;
                height: 18px;
                font-size: 0.65rem;
            }

            .nav-links a {
                font-size: 0.72rem;
                padding: 0.25rem 0.4rem;
            }
        }

        ::selection {
            background: var(--accent);
            color: #fff;
        }

        /* ===== Override: Use main-page mobile nav ===== */
        .hamburger-btn#hamburger-toggle {
            display: none;
        }
        @media (max-width: 768px) {
            .hamburger-btn#hamburger-toggle {
                display: block !important;
            }
            nav { display: none !important; }
        }

        /* ===== Unified Nav+Hamburger Override ===== */
        nav {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 1.6rem;
        }
        nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding-bottom: 3px;
            border-bottom: 2px solid transparent;
        }
        nav a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }
        #hamburger-toggle {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }
        #hamburger-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #fff;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .mobile-nav-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .mobile-nav-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }
        .mobile-nav-content {
            text-align: center;
        }
        .mobile-nav-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .mobile-nav-logo img {
            height: 36px;
        }
        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .mobile-nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .mobile-nav-links a:hover {
            color: #9CC98D;
        }
        @media (max-width: 768px) {
            nav { display: none !important; }
            #hamburger-toggle { display: block !important; }
        }

        /* ===== RWD & Hamburger Menu ===== */
        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
            /* Positioning for absolute cases */
            position: relative;
        }

        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #000000 !important;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Hamburger open state */
        .hamburger-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger-btn.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Header Specific */
            header {
                padding: 0.8rem 5% !important;
            }

            .hamburger-btn {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 260px;
                height: 100vh;
                background-color: rgba(15, 15, 15, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column !important;
                align-items: flex-start !important;
                justify-content: flex-start !important;
                padding: 5rem 2rem 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
                z-index: 999;
                /* Reset existing gap to ensure clean layout */
                gap: 1.5rem !important;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.15rem !important;
                width: 100%;
                padding-bottom: 0.8rem;
                display: block;
            }

            /* Generic Resizing Fixes for Cards and Grids */
            /* Removed stats-row and shop-grid overrides here so they use native mobile styles */
            .card-grid,
            .stamp-grid {
                grid-template-columns: 1fr !important;
            }


            .shop-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 1rem !important;
                padding: 0 1rem 2rem !important;
            }

            /* Fixes explicitly for admin dashboard columns */
            .sidebar {
                width: 100% !important;
                position: static !important;
                height: auto !important;
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }

            .main-content {
                padding: 1.5rem !important;
            }

            /* Modal widths */
            .modal-content,
            .task-modal-content,
            .shop-modal-content {
                width: 90% !important;
                margin: 10vh auto !important;
                padding: 1.5rem !important;
            }

            /* Pricing Tiers / Subscription Page */
            .pricing-tier {
                flex: none !important;
                width: 100%;
            }

            .pricing-tiers {
                flex-direction: column !important;
                gap: 1.5rem !important;
            }

            .compare-table {
                display: block;
                overflow-x: auto;
            }

            /* Sponsor Dashboard Layout */
            .dashboard-layout {
                grid-template-columns: 1fr !important;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Force auth tools to hide when space is too tight or neatly align */
            .header-right {
                margin-left: auto;
                gap: 0.5rem;
            }

            .auth-info-bar,
            .user-auth {
                display: none !important;
            }

            /* Simplify header on mobile */

            /* Give hamburger priority */
            .hamburger-btn {
                display: block !important;
                margin-left: 10px;
            }

            /* Logo resizing */
            .logo-section span {
                font-size: 1rem;
            }
        }

        /* ===== Global Vertical Space Reduction (Mobile) ===== */
        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Reduce padding on hero sections to save space */
            .hero-section,
            .sub-hero,
            .wallet-hero,
            .profile-hero {
                padding: 1.5rem 1rem 2.8rem !important;
            }

            .hero-section h1,
            .sub-hero h1,
            .wallet-hero h1 {
                font-size: 1.5rem !important;
                margin-bottom: 0.3rem !important;
            }

            .hero-section p,
            .sub-hero p {
                font-size: 0.9rem !important;
            }

            /* Main containers constraints */
            .main-content,
            .dashboard-layout {
                padding: 1rem !important;

            }

            /* Status bars or quick stats */
            .status-bar,
            .stats-row {
                padding: 0.8rem 1rem !important;
                margin-bottom: 1rem !important;
            }

            /* Info cards and section cards */
            .info-card,
            .section-card,
            .shop-item,
            .task-card {
                padding: 1rem !important;
                margin-bottom: 0.8rem !important;
            }

            .section-title {
                margin: 1.5rem 0 1rem !important;
            }

            .section-title h2 {
                font-size: 1.3rem !important;
            }

            /* Lists and rows inside cards */
            ul.plan-features li,
            .reward-row,
            .task-row,
            .history-item {
                padding: 0.4rem 0 !important;
            }
        }
    </style>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>
    <!-- 
      【頁面功能說明 — stickers.html】
      「我的貼圖庫」頁面。展示使用者目前已解鎖或購買的所有專屬貼圖，並提供前往貼圖商城的捷徑。
    -->
    <!-- ===== Header ===== -->
    <header>
        <a href="index.html" class="logo-section" style="text-decoration:none;">
            <img src="../assets/images/logo.png" alt="InsureTech Logo">
            <span>百保袋</span>
        </a>
        <nav>
            <ul>

    <!-- ===== Scripts ===== -->
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/idb-files.js"></script>
    <script src="../scripts/ad-sdk.js"></script>
    <script>
        // ====================================================================
        // 【新手導讀 — stickers.html 的 JavaScript】
        // ====================================================================
        // 前台貼圖商城：瀏覽、解鎖（購買/看廣告）貼圖
        //
        // 資料來源：
        //   1. fetch('../assets/stickers/stickers.json') → 主要資料源
        //   2. localStorage('admin_sticker_data') → fallback / admin 編輯過的資料
        //
        // 解鎖狀態（user-keyed）：
        //   localStorage('sticker_unlocks_{userId}') — 每位使用者獨立
        //   migration: 如果舊的 'unlocked_stickers' (global key) 存在 → 合併
        //
        // 【遷移須知】
        //   - loadStickers()    → GET  /api/stickers
        //   - unlockWithCoins() → POST /api/stickers/unlock { id, method: 'coins' }
        //   - unlockWithAd()    → POST /api/stickers/unlock { id, method: 'ad' }
        // ====================================================================

        // ===== 核心狀態 =====
        let allStickers = [];
        let currentFilter = 'all';
        let pendingUnlockId = null;

        const STICKER_DATA_KEY = 'admin_sticker_data';

        // ===== User-keyed Unlock Storage =====
        // 每位使用者的解鎖資料存在不同 key，避免多帳號互相覆蓋
        function _unlockKey() {
            const u = getAuthenticatedUser();
            return u ? 'sticker_unlocks_' + u.id : 'sticker_unlocks_guest';
        }
        function getUnlocked() {
            try { return JSON.parse(localStorage.getItem(_unlockKey()) || '[]'); } catch { return []; }
        }
        function saveUnlocked(arr) {
            localStorage.setItem(_unlockKey(), JSON.stringify(arr));
        }
        function isUnlocked(id) { return getUnlocked().includes(id); }
        function markUnlocked(id) {
            const arr = getUnlocked();
            if (!arr.includes(id)) { arr.push(id); saveUnlocked(arr); }
        }

        // Migration: 把舊的 global key 合併到 user-keyed
        function migrateOldUnlocks() {
            const oldKey = 'unlocked_stickers';
            const old = localStorage.getItem(oldKey);
            if (!old) return;
            try {
                const oldArr = JSON.parse(old);
                if (Array.isArray(oldArr) && oldArr.length > 0) {
                    const current = getUnlocked();
                    const merged = [...new Set([...current, ...oldArr])];
                    saveUnlocked(merged);
                    console.log('[Stickers] 已遷移舊解鎖資料，共', oldArr.length, '筆');
                }
                localStorage.removeItem(oldKey);
            } catch { }
        }

        // ===== VIP 狀態 =====
        function isUserVip() {
            if (typeof getUserData === 'function') {
                const d = getUserData();
                const level = (d && d.vip_level) || 'free';
                return level === 'basic' || level === 'pro';
            }
            return false;
        }

        // VIP 使用者自動解鎖所有 VIP 貼圖
        function autoUnlockVipStickers() {
            if (!isUserVip()) return;
            const unlocked = getUnlocked();
            let changed = false;
            allStickers.forEach(s => {
                if (s.vip && !unlocked.includes(s.id)) {
                    unlocked.push(s.id);
                    changed = true;
                }
            });
            if (changed) {
                saveUnlocked(unlocked);
                console.log('[Stickers] VIP 自動解鎖 VIP 貼圖');
            }
        }

        // ===== 載入貼圖列表 =====
        async function loadStickers() {
            try {
                const res = await fetch('../assets/stickers/stickers.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allStickers = await res.json();
                console.log('[Stickers] 從 stickers.json 載入，共', allStickers.length, '筆');
            } catch (err) {
                console.warn('[Stickers] 無法載入 stickers.json:', err.message);
                const cached = localStorage.getItem(STICKER_DATA_KEY);
                if (cached) {
                    try { allStickers = JSON.parse(cached); } catch { allStickers = []; }
                }
            }
        }

        // ===== Coins =====
        function getCoins() {
            if (typeof getUserData === 'function') return getUserData().coins || 0;
            return parseInt(localStorage.getItem('user_coins') || '50', 10);
        }
        function spendCoins(amount) {
            if (typeof getUserData === 'function' && typeof saveUserData === 'function') {
                const data = getUserData();
                data.coins = Math.max(0, (data.coins || 0) - amount);
                saveUserData(data);
                return data.coins;
            }
            const current = getCoins();
            const v = Math.max(0, current - amount);
            localStorage.setItem('user_coins', String(v));
            return v;
        }

        // ===== 篩選 =====
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === f);
            });
            renderGrid();
        }

        function buildCategoryFilters() {
            const bar = document.getElementById('filter-bar');
            const cats = [...new Set(allStickers.map(s => s.category).filter(Boolean))];
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = 'cat:' + cat;
                btn.textContent = cat;
                btn.onclick = () => setFilter('cat:' + cat);
                bar.appendChild(btn);
            });
        }

        // ===== 渲染 =====
        function renderAll() {
            renderStats();
            renderGrid();
        }

        function renderStats() {
            const unlocked = getUnlocked();
            const coins = getCoins();
            document.getElementById('stat-unlocked').textContent = unlocked.length;
            document.getElementById('stat-total').textContent = allStickers.length;
            document.getElementById('stat-coins').textContent = coins;
            const hc = document.getElementById('header-coins');
            if (hc) hc.textContent = coins;
        }

        function renderGrid() {
            const grid = document.getElementById('shop-grid');
            const unlocked = getUnlocked();

            let list = allStickers;
            if (currentFilter === 'unlocked') {
                list = list.filter(s => unlocked.includes(s.id));
            } else if (currentFilter === 'locked') {
                list = list.filter(s => !unlocked.includes(s.id));
            } else if (currentFilter.startsWith('cat:')) {
                list = list.filter(s => s.category === currentFilter.slice(4));
            }

            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>此分類沒有貼圖</div>
                    </div>`;
                return;
            }

            const userIsVip = isUserVip();
            grid.innerHTML = list.map((s, i) => {
                const owned = unlocked.includes(s.id);
                const cardClass = owned ? 'unlocked' : 'locked';

                const imgInner = s._preview
                    ? `<img src="${s._preview}" alt="${s.name}">`
                    : `<span class="placeholder">${s.emoji || '🎨'}</span>`;

                let btnHTML;
                if (owned) {
                    btnHTML = `<button class="unlock-btn owned">✓ 已擁有</button>`;
                } else if (s.vip && userIsVip) {
                    // VIP 使用者對 VIP 貼圖→免費解鎖
                    btnHTML = `<button class="unlock-btn buy" style="background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;" onclick="event.stopPropagation(); vipFreeUnlockDirect('${s.id}')">🔓 免費解鎖</button>`;
                } else if (s.vip && !userIsVip) {
                    btnHTML = `<button class="unlock-btn vip-only">👑 VIP 專屬</button>`;
                } else {
                    btnHTML = `<button class="unlock-btn buy" onclick="event.stopPropagation(); openUnlock('${s.id}')">🔓 解鎖</button>`;
                }

                return `
                    <div class="shop-card ${cardClass}"
                         data-id="${s.id}"
                         style="animation-delay:${i * 0.03}s"
                         onclick="handleCardClick('${s.id}')">
                        ${s.vip ? '<div class="vip-tag">👑 VIP</div>' : ''}
                        <div class="card-img-area">
                            ${imgInner}
                            <span class="emoji-badge">${s.emoji || ''}</span>
                        </div>
                        <div class="card-name">${s.name}</div>
                        <div class="card-desc">${s.desc || ''}</div>
                        <div class="card-category">${s.category || ''}</div>
                        ${btnHTML}
                    </div>`;
            }).join('');
        }

        // ===== 卡片點擊 =====
        function handleCardClick(id) {
            if (isUnlocked(id)) {
                showToast('😊', '你已經擁有這張貼圖！');
                return;
            }
            const s = allStickers.find(x => x.id === id);
            if (s && s.vip && !isUserVip()) {
                showToast('⭐', 'VIP 專屬貼圖，請先升級方案');
                return;
            }
            // VIP 使用者點 VIP 貼圖 → 直接免費解鎖
            if (s && s.vip && isUserVip()) {
                vipFreeUnlockDirect(id);
                return;
            }
            openUnlock(id);
        }

        // ===== 解鎖 Modal =====
        function openUnlock(id) {
            const s = allStickers.find(x => x.id === id);
            if (!s) return;
            pendingUnlockId = id;
            document.getElementById('modal-emoji').textContent = s.emoji || '🎨';
            document.getElementById('modal-name').textContent = s.name;
            document.getElementById('modal-desc').textContent = s.desc || '';

            const coins = getCoins();
            const buyBtn = document.getElementById('btn-coin-buy');
            const warn = document.getElementById('coin-warn');
            if (coins < 5) {
                buyBtn.disabled = true;
                warn.style.display = 'block';
            } else {
                buyBtn.disabled = false;
                warn.style.display = 'none';
            }

            // VIP 免費解鎖按鈕
            const vipBtn = document.getElementById('btn-vip-free');
            if (s.vip && isUserVip()) {
                vipBtn.style.display = 'block';
                buyBtn.style.display = 'none';
            } else {
                vipBtn.style.display = 'none';
                buyBtn.style.display = 'block';
            }

            // 廣告解鎖按鈕 cap 資訊
            const adBtn = document.getElementById('btn-ad-unlock');
            const capHint = document.getElementById('ad-cap-hint-sticker');
            if (typeof AD_SDK !== 'undefined') {
                const capInfo = AD_SDK.getRewardedCapInfo();
                if (capInfo.exhausted) {
                    adBtn.disabled = true;
                    adBtn.textContent = '⏰ 今日次數已用完';
                    capHint.style.display = 'block';
                    capHint.style.color = '#e74c3c';
                    capHint.textContent = `今日 ${capInfo.total} 次已用完，明天再來！`;
                } else {
                    adBtn.disabled = false;
                    adBtn.textContent = `📺 看廣告解鎖（剩餘 ${capInfo.remaining} 次）`;
                    capHint.style.display = 'block';
                    capHint.style.color = '#7BB369';
                    capHint.textContent = `今日剩餘 ${capInfo.remaining}/${capInfo.total} 次`;
                }
            }

            document.getElementById('unlock-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('unlock-modal').classList.remove('show');
            pendingUnlockId = null;
        }

        // ===== 用 Coins 解鎖 =====
        function unlockWithCoins() {
            if (!pendingUnlockId) return;
            const coins = getCoins();
            if (coins < 5) { showToast('⚠️', 'Coins 不足！'); return; }

            const id = pendingUnlockId;
            const s = allStickers.find(x => x.id === id);
            spendCoins(5);

            if (typeof addHistory === 'function') {
                addHistory('spend', '解鎖貼圖：' + (s ? s.name : id), -5);
            }

            closeModal();
            completeUnlock(id);
        }

        // ===== 看廣告解鎖（使用 ad-sdk.js） =====
        function unlockWithAd() {
            const id = pendingUnlockId;

            // Cap 檢查
            if (typeof AD_SDK !== 'undefined') {
                const capInfo = AD_SDK.getRewardedCapInfo();
                if (capInfo.exhausted) {
                    showToast('⏰', '今日廣告次數已用完，明天再來！');
                    return;
                }
            }

            closeModal();

            if (typeof showRewardedAd === 'function') {
                showRewardedAd({
                    placement: 'sticker',
                    onReward: () => { completeUnlock(id); },
                    onCancel: () => { renderAll(); }
                });
            } else {
                // Fallback: 如果 ad-sdk 未載入，直接解鎖
                completeUnlock(id);
            }
        }

        // ===== VIP 免費解鎖（單張） =====
        function vipFreeUnlock() {
            if (!pendingUnlockId) return;
            if (!isUserVip()) { showToast('⚠️', '需要 VIP 權限'); return; }
            const id = pendingUnlockId;
            closeModal();
            completeUnlock(id);
        }

        function vipFreeUnlockDirect(id) {
            if (!isUserVip()) { showToast('⚠️', '需要 VIP 權限'); return; }
            completeUnlock(id);
        }

        // ===== 一鍵解鎖所有 VIP =====
        function unlockAllVip() {
            if (!isUserVip()) { showToast('⚠️', '需要 VIP 權限'); return; }
            const unlocked = getUnlocked();
            const toUnlock = allStickers.filter(s => s.vip && !unlocked.includes(s.id));
            if (toUnlock.length === 0) {
                showToast('✅', '所有 VIP 貼圖已解鎖！');
                return;
            }
            toUnlock.forEach(s => markUnlocked(s.id));
            renderAll();
            showVipJoyModal(toUnlock);
        }

        function showVipJoyModal(stickers) {
            const listEl = document.getElementById('vip-joy-list');
            const countEl = document.getElementById('vip-joy-count');
            listEl.innerHTML = stickers.map(s =>
                `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.6rem;
                    background:rgba(255,215,0,0.06);border-radius:8px;margin-bottom:0.3rem;">
                    <span style="font-size:1.5rem;">${s.emoji || '🎨'}</span>
                    <span style="font-size:0.85rem;color:#e0e0e0;">${s.name}</span>
                </div>`
            ).join('');
            countEl.textContent = `共解鎖 ${stickers.length} 張 VIP 貼圖 🎉`;
            document.getElementById('vip-joy-modal').style.display = 'flex';
        }

        function closeVipJoyModal() {
            document.getElementById('vip-joy-modal').style.display = 'none';
        }

        // ===== 解鎖完成 =====
        function completeUnlock(id) {
            if (!id) return;
            markUnlocked(id);
            renderAll();

            // 解鎖動畫
            const card = document.querySelector(`.shop-card[data-id="${id}"]`);
            if (card) {
                card.classList.add('just-unlocked');
                card.classList.remove('locked');
                card.classList.add('unlocked');

                // 彩紙粒子
                const colors = ['#9CC98D', '#FFD700', '#ff6b6b', '#48dbfb', '#feca57'];
                for (let i = 0; i < 8; i++) {
                    const p = document.createElement('div');
                    p.className = 'confetti';
                    p.style.background = colors[i % colors.length];
                    p.style.left = (25 + Math.random() * 50) + '%';
                    p.style.top = (20 + Math.random() * 40) + '%';
                    p.style.animationDelay = (Math.random() * 0.3) + 's';
                    card.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }
                setTimeout(() => card.classList.remove('just-unlocked'), 800);
            }

            const s = allStickers.find(x => x.id === id);
            showToast('🎉', `已解鎖「${s ? s.name : '貼圖'}」！`);
        }

        // ===== Toast =====
        function showToast(icon, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-icon').textContent = icon;
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', async () => {
            migrateOldUnlocks();
            await loadStickers();
            // autoUnlockVipStickers 已移除 — VIP 使用者現在用「免費解鎖」或「一鍵解鎖」
            buildCategoryFilters();
            renderAll();

            // VIP 一鍵解鎖按鈕可見性
            const batchArea = document.getElementById('vip-batch-unlock-area');
            if (batchArea && isUserVip()) {
                const unlocked = getUnlocked();
                const remaining = allStickers.filter(s => s.vip && !unlocked.includes(s.id));
                if (remaining.length > 0) {
                    batchArea.style.display = 'block';
                    document.getElementById('btn-unlock-all-vip').textContent =
                        `⚡ 一鍵解鎖所有 VIP 貼圖（${remaining.length} 張）`;
                }
            }
        });

        // 跨分頁同步
        window.addEventListener('userDataSync', renderAll);
    </script>

    <!-- ===== Hamburger Menu Logic ===== -->
    <script>
    // Unified hamburger menu (injected by header standardization)
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('hamburger-toggle');
        var nav = document.getElementById('mobile-nav');
        var close = document.getElementById('mobile-nav-close');
        if (btn && nav) {
            btn.onclick = function() { nav.classList.toggle('active'); };
        }
        if (close && nav) {
            close.onclick = function() { nav.classList.remove('active'); };
        }
    });
    </script>
