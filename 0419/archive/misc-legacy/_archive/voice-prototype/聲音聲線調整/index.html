<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聲音聲線調整 — AI 語音助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-left">
      <span class="header-icon">🎙️</span>
      <div class="header-title">
        <h1>聲音聲線調整</h1>
        <div class="subtitle">AI 語音合成 · 多聲線試聽 · 中英文支援 AIzaSyBlBVj5zioaE0WBstDFcSNQ3YlPa32tjUw</div>
      </div>
    </div>
    <div class="header-right">
      <span class="model-badge">Gemini TTS</span>
      <button class="btn-icon" id="btn-settings" title="設定 API Key">⚙️</button>
    </div>
  </header>

  <!-- ===== SETTINGS PANEL ===== -->
  <div class="settings-panel collapsed" id="settings-panel">
    <div class="settings-inner">
      <label>Gemini API Key</label>
      <div class="input-row">
        <input type="password" id="api-key-input" placeholder="輸入 Gemini API Key（AIzaSy...）" />
        <button class="btn-primary" id="btn-save-key">儲存</button>
      </div>
      <p class="hint">🔒 API Key 僅儲存在您的瀏覽器本機（localStorage），不會上傳任何伺服器。</p>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- 聲線選擇 -->
    <section>
      <div class="section-title">🎭 選擇聲線（點擊選擇 · 支援中文 ／ English）</div>
      <div class="voice-grid" id="voice-grid">
        <!-- 由 app.js 動態渲染 -->
      </div>
    </section>

    <!-- 功能區 -->
    <section>
      <div class="section-title">🛠️ 功能操作</div>

      <!-- Tab 切換 -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="tts">📝 文字轉語音</button>
        <button class="tab-btn" data-tab="chat">💬 AI 對話語音</button>
      </div>

      <!-- Tab：文字轉語音 -->
      <div class="tab-panel active" id="tab-tts">
        <textarea
          id="tts-text"
          placeholder="輸入任意中文或英文文字，系統將使用您選擇的聲線合成語音...

範例：
「您好，歡迎使用我們的智能語音服務！我們提供專業的保險諮詢，歡迎隨時提問。」
「Hello! Welcome to our AI voice service. How may I assist you today?」"
        ></textarea>
        <div class="action-row">
          <span class="char-count"><span id="char-count">0</span> 字</span>
          <button class="btn-primary btn-large" id="btn-speak">▶&nbsp; 生成語音</button>
        </div>
      </div>

      <!-- Tab：AI 對話語音 -->
      <div class="tab-panel" id="tab-chat">
        <div class="chat-history" id="chat-history">
          <p class="chat-empty">開始對話吧！AI 回覆將自動用您選定的聲線播放。</p>
        </div>
        <div class="chat-input-row">
          <input
            type="text"
            id="chat-input"
            placeholder="輸入問題，AI 將以選定聲線回覆（按 Enter 送出）..."
          />
          <button class="btn-primary" id="btn-chat-send">送出</button>
        </div>
      </div>
    </section>

    <!-- 音訊播放器 -->
    <section class="audio-player-section" id="audio-player-section" style="display:none">
      <div class="section-title">🔊 播放結果</div>
      <div class="player-top">
        <span class="player-voice-info" id="player-voice-info">—</span>
        <span class="player-status ready" id="player-status">就緒</span>
      </div>
      <audio id="main-audio" controls></audio>
      <div class="player-controls">
        <label>
          速度
          <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
          <span class="ctrl-val" id="speed-val">1.0</span>x
        </label>
        <label>
          音量
          <input type="range" id="vol-slider" min="0" max="100" step="5" value="100" />
          <span class="ctrl-val" id="vol-val">100</span>%
        </label>
      </div>
    </section>

  </main>

  <!-- ===== LOADING OVERLAY ===== -->
  <div class="loading-overlay" id="loading-overlay" style="display:none">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-text">處理中...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
