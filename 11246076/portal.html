<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服務入口 - 譯保通 InsureTech</title>
    <meta name="description" content="譯保通服務入口 — 依照您的權限顯示可使用的功能">
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #848d97;
            --accent: #9CC98D;
            --accent-dark: #7BB369;
            --accent-dim: rgba(156, 201, 141, 0.12);
            --gold: #f0c040;
            --gold-dim: rgba(240, 192, 64, 0.12);
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #bc8cff;
            --radius: 16px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            font-size: 0.9rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .role-tag {
            padding: 0.2rem 0.7rem;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .role-tag.admin {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        .role-tag.sponsor {
            background: var(--gold-dim);
            color: var(--gold);
        }

        .role-tag.agent {
            background: rgba(188, 140, 255, 0.15);
            color: var(--purple);
        }

        .role-tag.user {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(248, 81, 73, 0.08);
        }

        /* ===== Main ===== */
        .portal {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .portal-hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .portal-hero .greeting {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .portal-hero .sub {
            color: var(--text-dim);
            font-size: 0.88rem;
        }

        /* ===== Category ===== */
        .category {
            margin-bottom: 2rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .category-header .cat-icon {
            font-size: 1.1rem;
        }

        /* ===== Cards Grid ===== */
        body .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 0.8rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.3rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .card:hover {
            border-color: rgba(156, 201, 141, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card .card-icon {
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }

        .card .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #000;
        }

        .card .card-desc {
            font-size: 0.78rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .card .card-badge {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            padding: 0.12rem 0.5rem;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        .card .card-badge.admin {
            background: rgba(248, 81, 73, 0.12);
            color: var(--red);
        }

        .card .card-badge.sponsor {
            background: var(--gold-dim);
            color: var(--gold);
        }

        .card .card-badge.agent {
            background: rgba(188, 140, 255, 0.12);
            color: var(--purple);
        }

        /* Admin 分類的 card 頂部條 */
        .category.admin-cat .card::before {
            background: linear-gradient(90deg, var(--red), #c73b3b);
        }

        .category.admin-cat .card:hover {
            border-color: rgba(248, 81, 73, 0.35);
        }

        .category.sponsor-cat .card::before {
            background: linear-gradient(90deg, var(--gold), #e6a800);
        }

        .category.sponsor-cat .card:hover {
            border-color: rgba(240, 192, 64, 0.35);
        }

        .category.agent-cat .card::before {
            background: linear-gradient(90deg, var(--purple), #9b59b6);
        }

        .category.agent-cat .card:hover {
            border-color: rgba(188, 140, 255, 0.35);
        }

        /* ===== Empty ===== */
        .empty-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
            font-size: 0.88rem;
        }

        .empty-msg .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* ===== Footer ===== */
        .portal-footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #484f58;
            font-size: 0.72rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            body .cards {
                grid-template-columns: 1fr;
            }

            .portal-hero .greeting {
                font-size: 1.2rem;
            }
        }

        /* ===== Override: Use main-page mobile nav ===== */
        .hamburger-btn#hamburger-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .hamburger-btn#hamburger-toggle {
                display: block !important;
            }

            nav {
                display: none !important;
            }
        }

        /* ===== Unified Nav+Hamburger Override ===== */
        nav {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.6rem;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding-bottom: 3px;
            border-bottom: 2px solid transparent;
        }

        nav a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        #hamburger-toggle {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        #hamburger-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #fff;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .mobile-nav-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .mobile-nav-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        .mobile-nav-content {
            text-align: center;
        }

        .mobile-nav-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .mobile-nav-logo img {
            height: 36px;
        }

        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .mobile-nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .mobile-nav-links a:hover {
            color: #9CC98D;
        }

        @media (max-width: 768px) {
            nav {
                display: none !important;
            }

            #hamburger-toggle {
                display: block !important;
            }
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

    <script src="auth.js"></script>
    <script>
        /**
         * 【Portal 入口頁】
         * 依目前登入者的 role 顯示對應可進入的頁面卡片。
         * role 定義：
         *   user    — 一般使用者（所有人都可以用的前台功能）
         *   sponsor — 贊助商（前台 + 贊助商後台）
         *   agent   — 保險員（前台 + 保險員後台）（未來擴充）
         *   admin   — 管理員（全部頁面皆可進）
         */

        // ═══════════════════════════════════════
        //  頁面清單定義
        //  roles: 哪些角色可以看到這張卡片
        //  category: 分類 key（用來分組）
        // ═══════════════════════════════════════
        const ALL_PAGES = [
            // ── 前台（所有角色皆可進） ──
            {
                id: 'subscription',
                title: '會員訂閱方案',
                desc: '查看並升級 Free / Basic / Pro 方案',
                icon: '💎',
                href: 'subscription.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'wallet',
                title: 'Coins 錢包',
                desc: '查看餘額、觀看廣告賺取 Coins',
                icon: '💰',
                href: 'wallet.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'checkin',
                title: '每日簽到',
                desc: '連續簽到領取 Coins 獎勵',
                icon: '📅',
                href: 'checkin.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'ai-consult',
                title: 'AI 保險諮詢',
                desc: '透過 AI 取得保險建議與問題解答',
                icon: '🤖',
                href: 'ai-consult.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'profile',
                title: '個人檔案',
                desc: '管理暱稱、頭像、查看徽章與交易紀錄',
                icon: '👤',
                href: 'profile.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'referral',
                title: '推薦好友',
                desc: '分享推薦碼，雙方獲得獎勵',
                icon: '🎁',
                href: 'referral.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'sticker-shop',
                title: '貼圖商城',
                desc: '用 Coins 購買或解鎖可愛貼圖',
                icon: '🎨',
                href: 'sticker-shop.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'community-sticker',
                title: '留言貼圖示範',
                desc: '在社群留言中使用已購買的貼圖',
                icon: '💬',
                href: 'community-sticker-demo.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },

            // ── 贊助商後台 ──
            {
                id: 'sponsor-dashboard',
                title: '贊助商後台',
                desc: '管理廣告活動、查看成效報表、儲值廣告帳戶',
                icon: '📢',
                href: 'sponsor-dashboard.html',
                roles: ['sponsor', 'admin'],
                category: 'sponsor',
                badge: '贊助商'
            },

            // ── 保險員後台 ──
            {
                id: 'insurance-register',
                title: '保險員註冊中心',
                desc: '保險從業人員註冊與登入入口',
                icon: '📋',
                href: 'insurance_register.html',
                roles: ['agent', 'admin'],
                category: 'agent',
                badge: '保險員'
            },
            {
                id: 'agent-profile',
                title: '保險員個人主頁',
                desc: '查看與編輯保險員個人檔案與業績',
                icon: '👤',
                href: 'agent_profile.html',
                roles: ['agent', 'admin'],
                category: 'agent',
                badge: '保險員'
            },
            {
                id: 'agent-chat',
                title: '保險員諮詢中心',
                desc: '管理客戶對話與即時諮詢',
                icon: '💬',
                href: 'agent_chat_dashboard.html',
                roles: ['agent', 'admin'],
                category: 'agent',
                badge: '保險員'
            },
            {
                id: 'user-match',
                title: '保險員配對',
                desc: '尋找適合您的專屬保險員',
                icon: '🤝',
                href: 'user_match.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },
            {
                id: 'user-group',
                title: '多人群聊專區',
                desc: '加入保險主題群組討論',
                icon: '👥',
                href: 'user_group.html',
                roles: ['user', 'sponsor', 'agent', 'admin'],
                category: 'general'
            },

            // ── 管理員後台 ──
            {
                id: 'admin-dashboard',
                title: '管理總台',
                desc: '用戶管理、系統總覽、費率設定',
                icon: '🛡️',
                href: 'admin-dashboard.html',
                roles: ['admin'],
                category: 'admin',
                badge: '管理員'
            },
            {
                id: 'admin-ads',
                title: '廣告管理後台',
                desc: '審核廣告素材、管理所有廣告活動',
                icon: '⚙️',
                href: 'admin-ads.html',
                roles: ['admin'],
                category: 'admin',
                badge: '管理員'
            },
            {
                id: 'sticker-admin',
                title: '貼圖管理後台',
                desc: '上架/下架貼圖、管理貼圖分類',
                icon: '🎭',
                href: 'sticker-admin.html',
                roles: ['admin'],
                category: 'admin',
                badge: '管理員'
            }
        ];

        // ═══════════════════════════════════════
        //  分類定義
        // ═══════════════════════════════════════
        const CATEGORIES = {
            general: { label: '一般功能', icon: '🏠', cssClass: '' },
            sponsor: { label: '贊助商後台', icon: '📢', cssClass: 'sponsor-cat' },
            agent: { label: '保險員後台', icon: '🏥', cssClass: 'agent-cat' },
            admin: { label: '管理員後台', icon: '🛡️', cssClass: 'admin-cat' }
        };

        // 分類顯示順序：特殊功能放前面，一般功能放最後
        const CATEGORY_ORDER = ['admin', 'sponsor', 'agent', 'general'];

        // ═══════════════════════════════════════
        //  角色顯示
        // ═══════════════════════════════════════
        const ROLE_LABELS = {
            admin: '管理員',
            sponsor: '贊助商',
            agent: '保險員',
            user: '一般使用者'
        };

        // ═══════════════════════════════════════
        //  渲染
        // ═══════════════════════════════════════
        function renderPortal() {
            const user = getAuthenticatedUser();
            if (!user) return;

            const role = getCurrentUserRole();

            // Greeting
            document.getElementById('greeting').textContent = `👋 ${user.displayName || user.username}，歡迎回來`;
            document.getElementById('greeting-sub').textContent =
                `您的身分：${ROLE_LABELS[role] || '一般使用者'}　—　請選擇要前往的功能`;

            // Role tag
            const roleTag = document.getElementById('header-role');
            if (roleTag) {
                roleTag.textContent = ROLE_LABELS[role] || '一般使用者';
                roleTag.className = 'role-tag ' + role;
            }

            // 過濾出此 role 可看到的頁面
            const visiblePages = ALL_PAGES.filter(p => p.roles.includes(role));

            // 依分類分組
            const grouped = {};
            visiblePages.forEach(p => {
                if (!grouped[p.category]) grouped[p.category] = [];
                grouped[p.category].push(p);
            });

            // 依 CATEGORY_ORDER 排序渲染
            const container = document.getElementById('portal-content');
            let html = '';

            CATEGORY_ORDER.forEach(catKey => {
                const pages = grouped[catKey];
                if (!pages || pages.length === 0) return;

                const cat = CATEGORIES[catKey];
                html += `
                <div class="category ${cat.cssClass}">
                    <div class="category-header">
                        <span class="cat-icon">${cat.icon}</span>
                        ${cat.label}
                    </div>
                    <div class="cards">
                        ${pages.map(p => {
                    const badgeHTML = p.badge
                        ? `<span class="card-badge ${p.category}">${p.badge}</span>`
                        : '';
                    return `
                            <a class="card" href="${p.href}">
                                ${badgeHTML}
                                <div class="card-icon">${p.icon}</div>
                                <div class="card-title">${p.title}</div>
                                <div class="card-desc">${p.desc}</div>
                            </a>`;
                }).join('')}
                    </div>
                </div>`;
            });

            if (!html) {
                html = `<div class="empty-msg"><div class="icon">🔒</div><div>目前沒有可用的功能</div></div>`;
            }

            container.innerHTML = html;
        }

        // ═══════════════════════════════════════
        //  Init
        // ═══════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            // auth.js 的 initAuthGate 會處理未登入情況
            // 這裡不用 requireRole，因為所有角色都可以進入入口頁
            if (!isLoggedIn()) return;

            renderPortal();

            document.getElementById('logout-btn').addEventListener('click', () => {
                logoutUser();
            });
        });
    </script>
    <script>
        // Unified hamburger menu (injected by header standardization)
        document.addEventListener('DOMContentLoaded', function () {
            var btn = document.getElementById('hamburger-toggle');
            var nav = document.getElementById('mobile-nav');
            var close = document.getElementById('mobile-nav-close');
            if (btn && nav) {
                btn.onclick = function () { nav.classList.toggle('active'); };
            }
            if (close && nav) {
                close.onclick = function () { nav.classList.remove('active'); };
            }
        });
    </script>
</body>

</html>
