<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人檔案 - 譯保通 InsureTech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-deep: #0a0e17;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --accent-green: #9CC98D;
            --accent-green-dim: rgba(156, 201, 141, 0.15);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --purple: #a855f7;
            --purple-dim: rgba(168, 85, 247, 0.15);
            --text: #e8e8e8;
            --text-dim: #adb5bd;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(145deg, var(--bg-deep) 0%, #111827 50%, #0a0e17 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            display: flex;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-green), #7BB369);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }

        .logo-section span {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        .nav-links {
            display: flex;
            gap: 0.3rem;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.82rem;
            padding: 0.35rem 0.7rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-links a.active {
            color: var(--accent-green);
            background: var(--accent-green-dim);
            font-weight: 600;
        }

        /* ===== Profile Hero ===== */
        .profile-hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.2rem;
            cursor: pointer;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            background: #1a1f2e;
            transition: all 0.3s;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* VIP frame colors */
        .avatar-circle.frame-free {
            border: 3px solid #555;
        }

        .avatar-circle.frame-basic {
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .avatar-circle.frame-pro {
            border: 3px solid transparent;
            background-image: linear-gradient(#1a1f2e, #1a1f2e), linear-gradient(135deg, #a855f7, #f093fb, #a855f7);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 0.8rem;
            color: #fff;
        }

        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        .profile-name-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        body .profile-display-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        body .edit-name-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.3rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .edit-name-btn:hover {
            color: var(--accent-green);
            background: var(--accent-green-dim);
        }

        body .profile-username {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .profile-vip-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        body .profile-vip-badge.free {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
        }

        .profile-vip-badge.basic {
            background: var(--gold-dim);
            color: var(--gold);
        }

        .profile-vip-badge.pro {
            background: var(--purple-dim);
            color: var(--purple);
        }

        .profile-vip-badge:hover {
            transform: scale(1.05);
        }

        /* ===== Nickname Edit Modal ===== */
        .name-edit-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .name-edit-card {
            background: #1e2333;
            border-radius: var(--radius);
            padding: 1.5rem;
            width: min(380px, 90vw);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .name-edit-card h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .name-edit-card input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            margin-bottom: 1rem;
        }

        .name-edit-card input:focus {
            border-color: var(--accent-green);
        }

        .name-edit-actions {
            display: flex;
            gap: 0.5rem;
        }

        .name-edit-actions button {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-save {
            background: var(--accent-green);
            color: #000;
        }

        .btn-save:hover {
            filter: brightness(1.1);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ===== Referral Input Card ===== */
        .ref-input-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(156, 201, 141, 0.05));
            border: 1px solid var(--purple-dim);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin: 1rem 2rem;
            text-align: center;
        }

        .ref-input-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .ref-timer {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .ref-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            max-width: 300px;
            margin: 0 auto;
        }

        .ref-input-group input {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
        }

        .ref-input-group button {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            background: var(--purple);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ref-input-group button:hover {
            background: #9333ea;
        }

        /* ===== Data Cards ===== */
        .data-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 1.5rem;
            padding: 0 3rem;
        }

        /* Clickable data-card */
        a.data-card {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .data-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
            transition: all 0.2s;
        }

        .data-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .data-card .dc-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .data-card .dc-value {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
        }

        .data-card .dc-label {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .data-card.coins-card .dc-value {
            color: var(--gold);
        }

        .data-card.streak-card .dc-value {
            color: var(--accent-green);
        }

        .data-card.ai-card .dc-value {
            color: #60a5fa;
        }

        .data-card.referral-card .dc-value {
            color: #f472b6;
        }

        .data-card.sticker-card .dc-value {
            color: #9b59b6;
        }

        /* ===== Quick Action Strip ===== */
        .quick-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 2rem;
            padding: 0 3rem;
        }

        .quick-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.4rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .quick-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-green);
            color: var(--accent-green);
            transform: translateY(-1px);
        }

        /* ===== Sections ===== */
        .section {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 2rem;
            padding: 0 3rem;
        }

        body .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e6edf3;
        }

        /* ===== Achievement Badges ===== */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.8rem;
        }

        .badge-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 0.6rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .badge-item.unlocked {
            border-color: rgba(156, 201, 141, 0.3);
            background: rgba(156, 201, 141, 0.05);
        }

        .badge-item.locked {
            opacity: 0.55;
            filter: grayscale(0.6);
        }

        .badge-item .badge-icon {
            font-size: 2rem;
            margin-bottom: 0.4rem;
        }

        body .badge-item .badge-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: #e6edf3;
        }

        body .badge-item .badge-desc {
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .badge-item .badge-check {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.7rem;
        }

        /* ===== Transaction History ===== */
        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tx-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .tx-type {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .tx-type.earn {
            background: rgba(156, 201, 141, 0.15);
        }

        .tx-type.spend {
            background: rgba(239, 68, 68, 0.15);
        }

        body .tx-label {
            font-size: 0.82rem;
            color: #e6edf3;
        }

        .tx-time {
            font-size: 0.68rem;
            color: var(--text-dim);
        }

        .tx-amount {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .tx-amount.positive {
            color: var(--accent-green);
        }

        .tx-amount.negative {
            color: #ef4444;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
            font-size: 0.85rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            .data-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            header {
                padding: 0.6rem 1rem;
            }

            .nav-links {
                gap: 0.15rem;
            }

            .nav-links a {
                font-size: 0.72rem;
                padding: 0.3rem 0.45rem;
            }

            .badges-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 400px) {
            .data-cards {
                grid-template-columns: 1fr 1fr;
            }

            .badges-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        ::selection {
            background: var(--accent-green);
            color: #000;
        }

        /* ===== RWD & Hamburger Menu ===== */
        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
            /* Positioning for absolute cases */
            position: relative;
        }

        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #ffffff !important;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Hamburger open state */
        .hamburger-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger-btn.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        @media (max-width: 768px) {

            html,
            body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Header Specific */
            header {
                padding: 0.8rem 5% !important;
            }

            .hamburger-btn {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 260px;
                height: 100vh;
                background-color: rgba(15, 15, 15, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column !important;
                align-items: flex-start !important;
                justify-content: flex-start !important;
                padding: 5rem 2rem 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
                z-index: 999;
                /* Reset existing gap to ensure clean layout */
                gap: 1.5rem !important;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.15rem !important;
                width: 100%;
                padding-bottom: 0.8rem;
                display: block;
            }

            /* Generic Resizing Fixes for Cards and Grids */
            .stats-row {
                flex-direction: column;
                gap: 1.2rem !important;
            }

            .card-grid,
            .shop-grid,
            .stamp-grid {
                grid-template-columns: 1fr !important;
            }

            /* Fixes explicitly for admin dashboard columns */
            .sidebar {
                width: 100% !important;
                position: static !important;
                height: auto !important;
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }

            .main-content {
                padding: 1.5rem !important;
            }

            /* Modal widths */
            .modal-content,
            .task-modal-content,
            .shop-modal-content {
                width: 90% !important;
                margin: 10vh auto !important;
                padding: 1.5rem !important;
            }

            /* Pricing Tiers / Subscription Page */
            .pricing-tier {
                flex: none !important;
                width: 100%;
            }

            .pricing-tiers {
                flex-direction: column !important;
                gap: 1.5rem !important;
            }

            .compare-table {
                display: block;
                overflow-x: auto;
            }

            /* Sponsor Dashboard Layout */
            .dashboard-layout {
                grid-template-columns: 1fr !important;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {

            html,
            body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Force auth tools to hide when space is too tight or neatly align */
            .header-right {
                margin-left: auto;
                gap: 0.5rem;
            }

            .auth-info-bar,
            .user-auth {
                display: none !important;
            }

            /* Simplify header on mobile */

            /* Give hamburger priority */
            .hamburger-btn {
                margin-left: 10px;
            }

            /* Logo resizing */
            .logo-section span {
                font-size: 1rem;
            }
        }

        /* ===== Global Vertical Space Reduction (Mobile) ===== */
        @media (max-width: 768px) {

            html,
            body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            /* Reduce padding on hero sections to save space */
            .hero-section,
            .sub-hero,
            .wallet-hero,
            .profile-hero {
                padding: 1.5rem 1rem 2.8rem !important;
            }

            .hero-section h1,
            .sub-hero h1,
            .wallet-hero h1 {
                font-size: 1.5rem !important;
                margin-bottom: 0.3rem !important;
            }

            .hero-section p,
            .sub-hero p {
                font-size: 0.9rem !important;
            }

            /* Main containers constraints */
            .main-content,
            .dashboard-layout {
                padding: 1rem !important;

            }

            /* Status bars or quick stats */
            .status-bar,
            .stats-row {
                padding: 0.8rem 1rem !important;
                margin-bottom: 1rem !important;
            }

            /* Info cards and section cards */
            .info-card,
            .section-card,
            .shop-item,
            .task-card {
                padding: 1rem !important;
                margin-bottom: 0.8rem !important;
                color: #e6edf3;
            }

            .section-title {
                margin: 1.5rem 0 1rem !important;

            }

            .section-title h2 {
                font-size: 1.3rem !important;

            }

            /* Lists and rows inside cards */
            ul.plan-features li,
            .reward-row,
            .task-row,
            .history-item {
                padding: 0.4rem 0 !important;
            }
        }

        /* ===== Override: Use main-page mobile nav ===== */
        .hamburger-btn#hamburger-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .hamburger-btn#hamburger-toggle {
                display: block !important;
            }

            nav {
                display: none !important;
            }
        }

        /* ===== Unified Nav+Hamburger Override ===== */
        nav {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.6rem;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding-bottom: 3px;
            border-bottom: 2px solid transparent;
        }

        nav a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        #hamburger-toggle {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        #hamburger-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #fff;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .mobile-nav-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .mobile-nav-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;

    <!-- Achievement Badges -->

    <!-- Transaction History -->

    </div>

    <div style="height:3rem;"></div>

    <script src="auth.js"></script>
    <script>
        // 【新手導讀 — profile.html 的 JavaScript】
        // 個人檔案頁：顯示用戶資料、徽章、交易紀錄
        // 功能：更換頭像、修改暱稱、查看成就
        // 【遷移須知】頭像上傳改為 POST /api/avatar，暱稱修改改為 PUT /api/profile

        /* ===== Badge Definitions ===== */
        // 成就徽章定義：每個徽章有 check 函式判斷是否解鎖
        const BADGES = [
            { id: 'first_login', icon: '🌟', name: '初次登入', desc: '首次登入成功', check: () => true },
            { id: 'streak_3', icon: '🔥', name: '三日連簽', desc: '連續簽到 3 天', check: d => (d.streak || 0) >= 3 },
            { id: 'streak_7', icon: '💪', name: '七日勇者', desc: '連續簽到 7 天', check: d => (d.streak || 0) >= 7 },
            { id: 'streak_30', icon: '👑', name: '月度王者', desc: '連續簽到 30 天', check: d => (d.streak || 0) >= 30 },
            { id: 'coins_500', icon: '💰', name: '小金庫', desc: '累計擁有 500 幣', check: d => (d.coins || 0) >= 500 },
            { id: 'coins_1000', icon: '🏦', name: '金幣大亨', desc: '累計擁有 1000 幣', check: d => (d.coins || 0) >= 1000 },
            { id: 'vip_basic', icon: '⭐', name: 'VIP 會員', desc: '升級為 Basic 方案', check: d => d.vip_level === 'basic' || d.vip_level === 'pro' },
            { id: 'vip_pro', icon: '💎', name: '尊榮 Pro', desc: '升級為 Pro 方案', check: d => d.vip_level === 'pro' },
            { id: 'ai_first', icon: '🤖', name: 'AI 初體驗', desc: '首次使用 AI 諨詢', check: d => (d.daily_ai_used || 0) >= 1 },
            { id: 'referral_1', icon: '🤝', name: '推薦達人', desc: '成功推薦 1 位好友', check: d => (d.referral_count || 0) >= 1 },
            { id: 'referral_5', icon: '🌐', name: '社交蝴蝶', desc: '成功推薦 5 位好友', check: d => (d.referral_count || 0) >= 5 },
            { id: 'avatar_set', icon: '🖼️', name: '個性頭像', desc: '上傳自訂頭像', check: () => !!getAvatar() },
        ];

        /* ===== Render ===== */
        // 主渲染函式：更新頭像、暱稱、VIP 徽章、數據卡、徽章、交易紀錄
        function renderProfile() {
            if (!isLoggedIn()) return;
            const data = getUserData();
            const user = getAuthenticatedUser();
            const avatar = getAvatar();
            const level = data.vip_level || 'free';

            // 頭像：根據 VIP 等級顯示不同邊框
            const circle = document.getElementById('avatar-circle');
            circle.className = 'avatar-circle frame-' + level;
            circle.innerHTML = avatar
                ? `<img src="${avatar}" alt="avatar">`
                : '<span>👤</span>';

            // 暱稱 和 帳號
            document.getElementById('profile-name').textContent = user.displayName || user.username;
            document.getElementById('profile-username').textContent = '@' + (user.username || '');

            // VIP 徽章（點擊可跳轉到訂閱頁）
            const vipEl = document.getElementById('profile-vip');
            const levelNames = { free: 'Free 會員', basic: '⭐ VIP Basic', pro: '👑 VIP Pro' };
            vipEl.textContent = levelNames[level] || 'Free 會員';
            vipEl.className = 'profile-vip-badge ' + level;

            // Sponsor 徽章
            const sponsorEl = document.getElementById('sponsor-badge');
            if (sponsorEl) {
                const role = typeof getCurrentUserRole === 'function' ? getCurrentUserRole() : '';
                sponsorEl.style.display = (role === 'sponsor') ? 'inline-block' : 'none';
            }

            // 數據卡片（幣、連續天數、AI 用量、推薦人數）
            document.getElementById('dc-coins').textContent = data.coins || 0;
            document.getElementById('dc-streak').textContent = data.streak || 0;
            document.getElementById('dc-ai').textContent = (data.daily_ai_used || 0) + ' / ' + getAiDailyLimit(data);
            document.getElementById('dc-referral').textContent = getReferralCountForData();

            // 更新貼圖蒐集數量（data-card）
            try {
                const stickerKey = user ? 'sticker_unlocks_' + user.id : 'sticker_unlocks_guest';
                const stickerUnlocks = JSON.parse(localStorage.getItem(stickerKey) || '[]');
                document.getElementById('dc-stickers').textContent = stickerUnlocks.length;
            } catch (e) {
                document.getElementById('dc-stickers').textContent = '0';
            }

            // 更新徽章及交易歷史
            renderBadges(data);
            renderHistory();

            // 更新推薦碼區塊
            renderReferralSection();
        }

        function getReferralCountForData() {
            try {
                const u = getAuthenticatedUser();
                if (!u) return 0;
                const refData = JSON.parse(localStorage.getItem('referral_data_' + u.id) || '{}');
                return refData.count || 0;
            } catch { return 0; }
        }

        let _refTimer = null;
        function renderReferralSection() {
            const sec = document.getElementById('ref-input-section');
            if (typeof canInputReferral !== 'function') {
                sec.style.display = 'none'; // Hide if function not available
                return;
            }
            const status = canInputReferral();

            if (status.reason === 'already_used') {
                sec.style.display = 'block';
                sec.style.background = 'rgba(255,255,255,0.03)';
                sec.style.borderColor = 'var(--border)';
                sec.innerHTML = `<div class="ref-input-header" style="color:var(--accent-green)">✅ 已綁定推薦人</div>
                                 <div class="ref-timer" style="margin-bottom:0;">分享喜悅！您的推薦人：${status.referrer}</div>`;
                if (_refTimer) clearInterval(_refTimer);
                return;
            }

            if (!status.canInput) {
                sec.style.display = 'none';
                if (_refTimer) clearInterval(_refTimer);
                return;
            }

            // 可以輸入推薦碼
            sec.style.display = 'block';

            if (_refTimer) clearInterval(_refTimer);
            _refTimer = setInterval(() => {
                const s = canInputReferral();
                if (!s.canInput) {
                    clearInterval(_refTimer);
                    renderReferralSection(); // 重新渲染（可能是過期了）
                } else {
                    const el = document.getElementById('ref-countdown-text');
                    if (el) el.textContent = s.remainingText;
                }
            }, 1000);
        }

        // 渲染成就徽章：遍歷 BADGES 陣列，根據 check() 判斷是否解鎖
        function renderBadges(data) {
            const grid = document.getElementById('badges-grid');
            grid.innerHTML = '';
            BADGES.forEach(b => {
                const unlocked = b.check(data); // 呼叫徽章的 check 函式
                const el = document.createElement('div');
                el.className = 'badge-item ' + (unlocked ? 'unlocked' : 'locked');
                el.innerHTML = `
                    ${unlocked ? '<span class="badge-check">✅</span>' : ''}
                    <div class="badge-icon">${b.icon}</div>
                    <div class="badge-name">${b.name}</div>
                    <div class="badge-desc">${b.desc}</div>
                `;
                grid.appendChild(el);
            });
        }

        // 渲染交易紀錄（最多 20 筆）
        function renderHistory() {
            const list = document.getElementById('tx-list');
            const history = getHistory(); // 由 auth.js 提供
            if (!history.length) {
                list.innerHTML = '<div class="empty-msg">尚無交易紀錄</div>';
                return;
            }
            list.innerHTML = '';
            history.slice(0, 20).forEach(tx => {
                const isEarn = tx.type === 'earn'; // earn=收入, spend=支出
                const el = document.createElement('div');
                el.className = 'tx-item';
                el.innerHTML = `
                    <div class="tx-left">
                        <div class="tx-type ${isEarn ? 'earn' : 'spend'}">${isEarn ? '📈' : '📉'}</div>
                        <div>
                            <div class="tx-label">${tx.label}</div>
                            <div class="tx-time">${tx.time}</div>
                        </div>
                    </div>
                    <div class="tx-amount ${isEarn ? 'positive' : 'negative'}">${isEarn ? '+' : '-'}${Math.abs(tx.amount)}</div>
                `;
                list.appendChild(el);
            });
        }

        /* ===== Avatar Upload ===== */
        // 頭像上傳：點擊頭像區域 → 觸發檔案選擇 → 讀取圖片 → 縮小到 200x200 → 存入 localStorage
        // 【遷移須知】改為 POST /api/avatar，上傳到伺服器
        document.getElementById('avatar-wrapper').addEventListener('click', () => {
            document.getElementById('avatar-input').click();
        });

        document.getElementById('avatar-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            // 限制檔案大小 500KB
            if (file.size > 500 * 1024) {
                alert('圖片大小不可超過 500KB');
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                // 縮圖到 200x200 像素，節省 localStorage 空間
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    // 置中裁切（確保正方形）
                    const size = Math.min(img.width, img.height);
                    const sx = (img.width - size) / 2;
                    const sy = (img.height - size) / 2;
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    saveAvatar(base64);  // 存入 localStorage
                    renderProfile();     // 重新渲染
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        /* ===== Nickname Edit ===== */
        // 暱稱修改：點擊編輯按鈕 → 彈窗輸入新暱稱 → 儲存
        // 【遷移須知】改為 PUT /api/profile
        document.getElementById('edit-name-btn').addEventListener('click', () => {
            const user = getAuthenticatedUser();
            if (!user) return;

            // 動態建立編輯彈窗
            const overlay = document.createElement('div');
            overlay.className = 'name-edit-overlay';
            overlay.innerHTML = `
                <div class="name-edit-card">
                    <h3>✏️ 修改暱稱</h3>
                    <input type="text" id="new-name-input" value="${user.displayName || ''}" placeholder="輸入新暱稱" maxlength="20">
                    <div class="name-edit-actions">
                        <button class="btn-cancel" id="name-cancel">取消</button>
                        <button class="btn-save" id="name-save">儲存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const input = document.getElementById('new-name-input');
            input.focus();  // 自動聚焦
            input.select(); // 選取所有文字

            // 取消按鈕
            document.getElementById('name-cancel').addEventListener('click', () => overlay.remove());
            // 點擊背景也可關閉
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

            // 儲存按鈕
            document.getElementById('name-save').addEventListener('click', () => {
                const newName = input.value.trim();
                if (!newName) { alert('暱稱不可為空'); return; }
                updateDisplayName(newName); // auth.js 提供的更新函式
                overlay.remove();
                renderProfile();
            });

            // 鍵盤快捷鍵：Enter=儲存、Esc=取消
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('name-save').click();
                if (e.key === 'Escape') overlay.remove();
            });
        });

        /* ===== Sync ===== */
        window.addEventListener('userDataSync', renderProfile); // 跨分頁同步
        // 監聽 role 變更（跨分頁）
        window.addEventListener('storage', (e) => {
            if (e.key === 'localUsers') renderProfile();
        });

        /* ===== Init ===== */
        document.addEventListener('DOMContentLoaded', () => {
            if (isLoggedIn()) renderProfile();

            // 推薦碼送出事件
            const btn = document.getElementById('ref-submit-btn');
            if (btn) {
                btn.addEventListener('click', () => {
                    const code = document.getElementById('ref-code-input').value;
                    if (typeof applyReferralCode !== 'function') return;

                    const res = applyReferralCode(code);
                    if (res.success) {
                        alert('🎉 ' + res.message);
                        renderProfile();
                    } else {
                        alert('❌ ' + res.message);
                    }
                });
            }
        });
    </script>

    <!-- ===== Portal Entry Button (Admin / Sponsor / Agent only) ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // auth.js 的 getCurrentUserRole() 會從 localUsers 查詢目前登入者的角色
            var role = (typeof getCurrentUserRole === 'function') ? getCurrentUserRole() : 'user';
            var PORTAL_ROLES = ['admin', 'sponsor', 'agent'];

            if (!PORTAL_ROLES.includes(role)) return; // 一般使用者不顯示

            // 依角色決定按鈕樣式
            var roleConfig = {
                admin: { label: '🛡️ 管理後台', color: '#f85149', bg: 'rgba(248,81,73,0.12)', border: 'rgba(248,81,73,0.35)' },
                sponsor: { label: '📢 贊助商後台', color: '#f0c040', bg: 'rgba(240,192,64,0.12)', border: 'rgba(240,192,64,0.35)' },
                agent: { label: '🏥 保險員後台', color: '#bc8cff', bg: 'rgba(188,140,255,0.12)', border: 'rgba(188,140,255,0.35)' }
            };
            var cfg = roleConfig[role];

            // 建立按鈕
            var btn = document.createElement('a');
            btn.href = 'portal.html';
            btn.className = 'quick-btn';
            btn.textContent = cfg.label;
            btn.style.cssText = [
                'color:' + cfg.color,
                'background:' + cfg.bg,
                'border-color:' + cfg.border,
                'font-weight:700'
            ].join(';');

            // hover 效果
            btn.addEventListener('mouseenter', function () {
                this.style.background = cfg.bg.replace('0.12', '0.22');
                this.style.transform = 'translateY(-2px)';
            });
            btn.addEventListener('mouseleave', function () {
                this.style.background = cfg.bg;
                this.style.transform = '';
            });

            // 插入到 quick-actions 開頭（讓後台按鈕最顯眼）
            var strip = document.querySelector('.quick-actions');
            if (strip) strip.insertBefore(btn, strip.firstChild);
        });
    </script>

    <!-- ===== Hamburger Menu Logic ===== -->

    <script>
        // Unified hamburger menu (injected by header standardization)
        document.addEventListener('DOMContentLoaded', function () {
            var btn = document.getElementById('hamburger-toggle');
            var nav = document.getElementById('mobile-nav');
            var close = document.getElementById('mobile-nav-close');
            if (btn && nav) {
                btn.onclick = function () { nav.classList.toggle('active'); };
            }
            if (close && nav) {
                close.onclick = function () { nav.classList.remove('active'); };
            }
        });

    </script>
