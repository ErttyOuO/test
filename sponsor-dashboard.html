<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贊助商後台 - 譯保通 Ad Manager</title>
    <meta name="description" content="贊助商廣告管理後台 — 上傳素材、管理活動、查看成效">
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #848d97;
            --accent: #9CC98D;
            --accent-dark: #7BB369;
            --accent-dim: rgba(156, 201, 141, 0.12);
            --gold: #f0c040;
            --gold-dim: rgba(240, 192, 64, 0.12);
            --red: #f85149;
            --blue: #58a6ff;
            --radius: 14px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
        }

        .logo-section .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ===== Layout ===== */
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 3rem;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .page-sub {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        /* ===== Wallet Strip ===== */
        .wallet-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .wallet-card {
            flex: 1;
            min-width: 180px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
        }

        .wallet-card .label {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }

        .wallet-card .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
        }

        .wallet-card .value.gold {
            color: var(--gold);
        }

        .deposit-btn {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.4rem 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .deposit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(156, 201, 141, 0.3);
        }

        /* ===== Section Card ===== */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.3rem;
            margin-bottom: 1.2rem;
        }

        .section-card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ===== Form ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-group.span2 {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.55rem 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.82rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .file-upload-area:hover {
            border-color: var(--accent);
            background: rgba(156, 201, 141, 0.04);
        }

        .file-upload-area .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .file-upload-area .upload-text {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .file-upload-area .upload-limit {
            font-size: 0.68rem;
            color: var(--red);
            margin-top: 0.3rem;
        }

        .file-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-area {
            margin-top: 0.8rem;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .preview-area img,
        .preview-area video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }

        .form-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #000;
        }

        .btn.primary:hover {
            transform: translateY(-1px);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-dim);
        }

        .btn.warning {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        /* ===== Campaign List ===== */
        .campaign-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .campaign-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .campaign-item:hover {
            border-color: rgba(156, 201, 141, 0.3);
        }

        .campaign-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: #1a1f2e;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.5rem;
        }

        .campaign-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .campaign-info {
            flex: 1;
            min-width: 0;
        }

        .campaign-info .name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .campaign-info .meta {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .campaign-stats {
            display: flex;
            gap: 0.8rem;
            flex-shrink: 0;
        }

        .campaign-stats .stat {
            text-align: center;
        }

        .campaign-stats .stat .num {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }

        .campaign-stats .stat .lbl {
            font-size: 0.6rem;
            color: var(--text-dim);
        }

        .status-badge {
            padding: 0.15rem 0.6rem;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .status-badge.draft {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-dim);
        }

        .status-badge.pending {
            background: var(--gold-dim);
            color: var(--gold);
        }

        .status-badge.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .status-badge.paused {
            background: rgba(248, 81, 73, 0.12);
            color: var(--red);
        }

        .status-badge.expired {
            background: rgba(255, 255, 255, 0.04);
            color: #666;
        }

        .campaign-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .campaign-actions button {
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-dim);
            border-radius: 8px;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .campaign-actions button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ===== History ===== */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.8rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .amount.positive {
            color: var(--accent);
        }

        .history-item .amount.negative {
            color: var(--red);
        }

        .history-item .time {
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: #1c2333;
            color: var(--text);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            z-index: 9999;
            font-size: 0.85rem;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.span2 {
                grid-column: span 1;
            }

            .campaign-stats {
                display: none;
            }

            .campaign-item {
                flex-wrap: wrap;
            }
        }

        /* ===== Budget Progress Bars ===== */
        .budget-bar-wrap {
            margin-top: 0.4rem;
        }

        .budget-bar-wrap .bar-label {
            font-size: 0.7rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .budget-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.3rem;
        }

        .budget-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .budget-bar-fill.daily {
            background: linear-gradient(90deg, #48dbfb, #0abde3);
        }

        .budget-bar-fill.total {
            background: linear-gradient(90deg, #feca57, #ff9f43);
        }

        .delivery-reason {
            font-size: 0.72rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            margin-top: 0.3rem;
            display: inline-block;
        }

        .delivery-reason.delivering {
            background: rgba(46, 213, 115, 0.12);
            color: #2ed573;
        }

        .delivery-reason.not-delivering {
            background: rgba(255, 107, 107, 0.12);
            color: #ff6b6b;
        }

        .material-warn {
            font-size: 0.72rem;
            color: #e74c3c;
            margin-top: 0.2rem;
        }

        .preview-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text);
            font-size: 0.72rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preview-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== Deposit Modal ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 8000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 1.8rem;
            max-width: 420px;
            width: 92%;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-backdrop.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-dim);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
            border-color: var(--red);
        }

        .deposit-current {
            text-align: center;
            padding: 0.8rem;
            background: rgba(240, 192, 64, 0.06);
            border: 1px solid rgba(240, 192, 64, 0.15);
            border-radius: 12px;
            margin-bottom: 1.2rem;
        }

        .deposit-current .cur-label {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .deposit-current .cur-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--gold);
        }

        .deposit-amounts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .deposit-amount-btn {
            padding: 0.8rem;
            border: 2px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .deposit-amount-btn:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .deposit-amount-btn.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            box-shadow: 0 0 16px rgba(156, 201, 141, 0.15);
        }

        .deposit-amount-btn .amt-price {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
        }

        .deposit-custom {
            margin-bottom: 1.2rem;
        }

        .deposit-custom label {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
            display: block;
        }

        .deposit-custom-input {
            width: 100%;
            padding: 0.65rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .deposit-custom-input:focus {
            border-color: var(--accent);
        }

        .deposit-summary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
        }

        .deposit-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
        }

        .deposit-summary .row.total {
            border-top: 1px solid var(--border);
            padding-top: 0.5rem;
            margin-top: 0.3rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .deposit-confirm-btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #000;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .deposit-confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(156, 201, 141, 0.3);
        }

        .deposit-confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .deposit-processing {
            display: none;
            text-align: center;
            padding: 2rem 1rem;
        }

        .deposit-processing .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(156, 201, 141, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: depositSpin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes depositSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .deposit-processing .proc-text {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .deposit-success {
            display: none;
            text-align: center;
            padding: 1.5rem 1rem;
        }

        .deposit-success .success-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
            animation: depositBounce 0.5s ease;
        }

        @keyframes depositBounce {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .deposit-success .success-msg {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .deposit-success .success-detail {
            font-size: 0.82rem;
            color: var(--text-dim);
        }
    
        /* ===== RWD & Hamburger Menu ===== */
        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
            /* Positioning for absolute cases */
            position: relative;
        }

        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: #FFFFFF !important;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Hamburger open state */
        .hamburger-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .hamburger-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .hamburger-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }
            /* Header Specific */
            header {
                padding: 0.8rem 5% !important;
            }
        
            .hamburger-btn {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 260px;
                height: 100vh;
                background-color: rgba(15, 15, 15, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column !important;
                align-items: flex-start !important;
                justify-content: flex-start !important;
                padding: 5rem 2rem 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
                z-index: 999;
                /* Reset existing gap to ensure clean layout */
                gap: 1.5rem !important; 
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.15rem !important;
                width: 100%;
                padding-bottom: 0.8rem;
                display: block;
            }

            /* Generic Resizing Fixes for Cards and Grids */
            .stats-row {
                flex-direction: column;
                gap: 1.2rem !important;
            }

            /* Logo resizing */
            .logo-section span { font-size: 1rem; }

        /* ===== Global Vertical Space Reduction (Mobile) ===== */
        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw !important;
                max-width: 100vw !important;

            /* Reduce padding on hero sections to save space */

<body>
    <!-- 
      【頁面功能說明 — sponsor-dashboard.html】
      贊助商/廣告主後台 (Sponsor Dashboard)。供廣告主登入查看其投放廣告的成效數據 (曝光數、點擊數、轉換率等) 以及預算消耗狀況。
    -->
    <header>
        <a href="admin-dashboard.html" class="logo-section">
            <div class="logo-icon">⚙</div>
            <span>管理後台</span>
        </a>
        <div class="nav-links" id="backend-nav">
            <a href="admin-dashboard.html">管理總台</a>
            <a href="admin-ads.html">廣告管理</a>
            <a href="sponsor-dashboard.html" class="active">贊助商</a>
            <a href="#" onclick="logoutUser(); return false;">🚪 登出</a>
        </div>
    </header>

    <div class="dashboard">
        <h1 class="page-title">📢 贊助商後台</h1>
        <p class="page-sub">管理您的廣告活動、查看成效報表</p>

        <!-- Wallet Strip -->
        <div class="wallet-strip">
            <div class="wallet-card">
                <div class="label">廣告帳戶餘額</div>
                <div class="value gold" id="w-balance">0</div>
                <button class="deposit-btn" onclick="depositFunds()">💰 儲值</button>
            </div>
            <div class="wallet-card">
                <div class="label">已花費（總計）</div>
                <div class="value" id="w-spent">0</div>
            </div>
            <div class="wallet-card">
                <div class="label">進行中活動</div>
                <div class="value" id="w-active-count">0</div>
            </div>
        </div>

        <!-- Create Campaign -->
        <div class="section-card" id="create-section">
            <h3>➕ 建立新廣告活動</h3>
            <form id="campaign-form" onsubmit="return false;">
                <div class="form-grid">
                    <div class="form-group span2">
                        <label>活動名稱</label>
                        <input type="text" id="f-name" placeholder="例：春季保險推廣" required>
                    </div>
                    <div class="form-group">
                        <label>廣告類型</label>
                        <select id="f-type">
                            <option value="rewarded">Rewarded 獎勵影片</option>
                            <option value="banner">Banner 橫幅圖</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>受眾</label>
                        <select id="f-targeting">
                            <option value="all">全體用戶</option>
                            <option value="vip">VIP 用戶</option>
                            <option value="new_users">新用戶</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>開始日期</label>
                        <input type="date" id="f-start">
                    </div>
                    <div class="form-group">
                        <label>結束日期</label>
                        <input type="date" id="f-end">
                    </div>
                    <div class="form-group">
                        <label>計費標準（系統設定，不可修改）</label>
                        <div id="f-cpc-display"
                            style="padding:0.55rem 0.8rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;color:var(--accent);font-size:0.82rem;font-weight:600;">
                            載入中…
                        </div>
                        <div style="font-size:0.65rem;color:var(--text-dim);margin-top:0.3rem;">
                            📌 系統會根據使用者的觀看行為（曝光、完整觀看、點擊）自動扣款
                        </div>
                    </div>
                    <div class="form-group">
                        <label>每日預算上限</label>
                        <input type="number" id="f-daily" min="0" value="100">
                    </div>
                    <div class="form-group">
                        <label>總預算上限</label>
                        <input type="number" id="f-total" min="0" value="1000">
                    </div>
                    <div class="form-group">
                        <label>點擊連結（選填）</label>
                        <input type="url" id="f-url" placeholder="https://...">
                    </div>

                    <!-- Upload -->
                    <div class="form-group span2">
                        <label>上傳素材</label>
                        <div class="file-upload-area" id="upload-area">
                            <div class="upload-icon">📁</div>
                            <div class="upload-text">點擊或拖曳上傳影片/圖片</div>
                            <div class="upload-limit">⚠️ 單檔上限 200MB｜支援 mp4 / webm / jpg / png / gif</div>
                            <input type="file" id="f-file" accept="video/*,image/*" onchange="handleFileUpload(this)">
                        </div>
                        <div class="preview-area" id="preview-area"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn primary" onclick="saveCampaignDraft()">💾 存為草稿</button>
                    <button class="btn primary" onclick="submitForReview()">📤 送審</button>
                    <button class="btn secondary" onclick="resetForm()">🔄 重設</button>
                </div>
            </form>
        </div>

        <!-- Campaign List -->
        <div class="section-card">
            <h3>📋 我的廣告活動</h3>
            <div class="campaign-list" id="campaign-list">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <div>尚無廣告活動</div>
                </div>
            </div>
        </div>

        <!-- Wallet History -->
        <div class="section-card">
            <h3>💳 帳戶交易紀錄</h3>
            <div id="wallet-history">
                <div class="empty-state">尚無交易紀錄</div>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div class="modal-backdrop" id="deposit-modal">
        <div class="modal-card">
            <div id="deposit-form-view">
                <div class="modal-header">
                    <h3>💰 帳戶儲值</h3>
                    <button class="modal-close" onclick="closeDepositModal()">✕</button>
                </div>
                <div class="deposit-current">
                    <div class="cur-label">目前帳戶餘額</div>
                    <div class="cur-value" id="deposit-cur-balance">0 儲值金</div>
                </div>
                <div class="deposit-amounts">
                    <button class="deposit-amount-btn" data-amt="500" onclick="selectDepositAmount(this)">
                        500 儲值金
                        <div class="amt-price">≈ NT$500</div>
                    </button>
                    <button class="deposit-amount-btn" data-amt="1000" onclick="selectDepositAmount(this)">
                        1,000 儲值金
                        <div class="amt-price">≈ NT$1,000</div>
                    </button>
                    <button class="deposit-amount-btn" data-amt="3000" onclick="selectDepositAmount(this)">
                        3,000 儲值金
                        <div class="amt-price">≈ NT$3,000</div>
                    </button>
                    <button class="deposit-amount-btn" data-amt="5000" onclick="selectDepositAmount(this)">
                        5,000 儲值金
                        <div class="amt-price">≈ NT$5,000</div>
                    </button>
                </div>
                <div class="deposit-custom">
                    <label>或輸入自訂金額</label>
                    <input type="number" class="deposit-custom-input" id="deposit-custom-input" placeholder="輸入金額"
                        min="1" oninput="onCustomAmountInput()">
                </div>
                <div class="deposit-summary">
                    <div class="row"><span>儲值金額</span><span id="dep-sum-amount">0 儲值金</span></div>
                    <div class="row"><span>手續費</span><span style="color:var(--accent);">免手續費</span></div>
                    <div class="row total"><span>實際到帳</span><span id="dep-sum-total">0 儲值金</span></div>
                </div>
                <button class="deposit-confirm-btn" id="deposit-confirm-btn" onclick="confirmDeposit()" disabled>
                    確認儲值
                </button>
            </div>
            <div class="deposit-processing" id="deposit-processing">
                <div class="spinner"></div>
                <div class="proc-text">付款處理中，請稍候…</div>
            </div>
            <div class="deposit-success" id="deposit-success">
                <div class="success-icon">✅</div>
                <div class="success-msg" id="deposit-success-msg">儲值成功！</div>
                <div class="success-detail" id="deposit-success-detail"></div>
                <button class="btn primary" style="margin-top:1rem;" onclick="closeDepositModal()">完成</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toast-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <script src="auth.js">
        // 【新手導讀 — sponsor-dashboard.html 的 JavaScript】
        // 此區塊驗證廣告主身分與對應權限；利用 Chart.js 繪製成效數據圖表；計算並呈現剩餘預算與點擊轉化率 (CTR) 等分析資料。
    </script>
    <script src="idb-files.js"></script>
    <script src="ad-sdk.js"></script>
    <script>
        // ===== 贊助商初始化 =====
        function getSponsorId() {
            const u = getAuthenticatedUser();
            return u ? u.id : 'anon';
        }

        function ensureSponsorProfile() {
            const id = getSponsorId();
            const profiles = AD_SDK.getSponsorProfiles();
            if (!profiles[id]) {
                const u = getAuthenticatedUser();
                profiles[id] = {
                    user_id: id,
                    company_name: u ? u.name : '贊助商',
                    verified: true,
                    frozen: false,
                    created_at: AD_SDK.todayStr()
                };
                AD_SDK.saveSponsorProfiles(profiles);
            }
            // 標記 user_data
            const data = getUserData();
            if (!data.is_sponsor) {
                data.is_sponsor = true;
                saveUserData(data);
            }
        }

        function ensureSponsorWallet() {
            const id = getSponsorId();
            const wallets = AD_SDK.getSponsorWallets();
            if (!wallets[id]) {
                wallets[id] = { balance: 0, total_deposited: 0, total_spent: 0 };
                AD_SDK.saveSponsorWallets(wallets);
            }
            return wallets[id];
        }

        // ===== 儲值 Modal =====
        let selectedDepositAmount = 0;

        function depositFunds() {
            openDepositModal();
        }

        function openDepositModal() {
            selectedDepositAmount = 0;
            // 更新目前餘額
            const id = getSponsorId();
            const wallets = AD_SDK.getSponsorWallets();
            const w = wallets[id] || { balance: 0 };
            document.getElementById('deposit-cur-balance').textContent = w.balance.toLocaleString() + ' 儲值金';

            // 重設 UI
            document.getElementById('deposit-form-view').style.display = 'block';
            document.getElementById('deposit-processing').style.display = 'none';
            document.getElementById('deposit-success').style.display = 'none';
            document.getElementById('deposit-custom-input').value = '';
            document.getElementById('deposit-confirm-btn').disabled = true;
            document.querySelectorAll('.deposit-amount-btn').forEach(b => b.classList.remove('selected'));
            updateDepositSummary(0);

            document.getElementById('deposit-modal').classList.add('active');
        }

        function closeDepositModal() {
            document.getElementById('deposit-modal').classList.remove('active');
        }

        function selectDepositAmount(btn) {
            document.querySelectorAll('.deposit-amount-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedDepositAmount = parseInt(btn.dataset.amt);
            document.getElementById('deposit-custom-input').value = '';
            updateDepositSummary(selectedDepositAmount);
            document.getElementById('deposit-confirm-btn').disabled = false;
        }

        function onCustomAmountInput() {
            const val = parseInt(document.getElementById('deposit-custom-input').value);
            document.querySelectorAll('.deposit-amount-btn').forEach(b => b.classList.remove('selected'));
            if (val > 0) {
                selectedDepositAmount = val;
                updateDepositSummary(val);
                document.getElementById('deposit-confirm-btn').disabled = false;
            } else {
                selectedDepositAmount = 0;
                updateDepositSummary(0);
                document.getElementById('deposit-confirm-btn').disabled = true;
            }
        }

        function updateDepositSummary(amt) {
            document.getElementById('dep-sum-amount').textContent = amt.toLocaleString() + ' 儲值金';
            document.getElementById('dep-sum-total').textContent = amt.toLocaleString() + ' 儲值金';
        }

        function confirmDeposit() {
            const amt = selectedDepositAmount;
            if (!amt || amt <= 0) return;

            // 顯示處理中
            document.getElementById('deposit-form-view').style.display = 'none';
            document.getElementById('deposit-processing').style.display = 'block';

            // 模擬付款延遲
            setTimeout(() => {
                // 實際儲值邏輯
                const id = getSponsorId();
                const wallets = AD_SDK.getSponsorWallets();
                const w = wallets[id] || { balance: 0, total_deposited: 0, total_spent: 0 };
                w.balance += amt;
                w.total_deposited += amt;
                wallets[id] = w;
                AD_SDK.saveSponsorWallets(wallets);

                // 寫交易紀錄
                const h = AD_SDK.getSponsorHistory(id);
                h.push({
                    id: 'swh_' + AD_SDK.uid(),
                    type: 'deposit',
                    amount: amt,
                    label: `儲值 ${amt.toLocaleString()} 儲值金`,
                    campaign_id: '',
                    timestamp: new Date().toISOString()
                });
                AD_SDK.saveSponsorHistory(id, h);

                // 顯示成功
                document.getElementById('deposit-processing').style.display = 'none';
                document.getElementById('deposit-success').style.display = 'block';
                document.getElementById('deposit-success-msg').textContent = `儲值成功！+${amt.toLocaleString()} 儲值金`;
                document.getElementById('deposit-success-detail').textContent = `帳戶餘額：${w.balance.toLocaleString()} 儲值金`;

                renderAll();
            }, 2000);
        }

        // ===== 素材上傳（存 IndexedDB） =====
        let uploadedFileId = '';
        let uploadedMediaType = '';
        let uploadedFileName = '';
        let uploadedSizeBytes = 0;

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            // 200MB 限制
            if (file.size > 200 * 1024 * 1024) {
                showToast('❌', '檔案超過 200MB 上限！');
                input.value = '';
                return;
            }

            uploadedMediaType = file.type.startsWith('video') ? 'video' : 'image';
            uploadedFileName = file.name;
            uploadedSizeBytes = file.size;

            // 存入 IndexedDB
            IDB_FILES.save({
                blob: file,
                type: file.type,
                name: file.name,
                sizeBytes: file.size
            }).then(fileId => {
                uploadedFileId = fileId;

                // 預覽
                const preview = document.getElementById('preview-area');
                preview.style.display = 'block';
                const objUrl = URL.createObjectURL(file);
                if (uploadedMediaType === 'video') {
                    preview.innerHTML = `<video src="${objUrl}" controls muted style="max-width:100%;max-height:200px;border-radius:10px;"></video>`;
                } else {
                    preview.innerHTML = `<img src="${objUrl}" style="max-width:100%;max-height:200px;border-radius:10px;">`;
                }

                const area = document.getElementById('upload-area');
                area.querySelector('.upload-text').textContent = `✅ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)}MB)`;
                showToast('✅', '素材已存入 IndexedDB');
            }).catch(err => {
                console.error('[IDB] save error', err);
                showToast('❌', '儲存失敗，請重試');
            });
        }

        // ===== 表單操作 =====
        function gatherFormData() {
            const name = document.getElementById('f-name').value.trim();
            if (!name) { showToast('⚠️', '請輸入活動名稱'); return null; }

            const adType = document.getElementById('f-type').value;
            // 費率強制使用系統設定，無論前端輸入任何值都會被覆蓋
            const rates = AD_SDK.getDefaultRates(adType);

            return {
                id: 'camp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                sponsor_id: getSponsorId(),
                name: name,
                type: adType,
                status: 'draft',
                creative: {
                    fileId: uploadedFileId,
                    fileName: uploadedFileName,
                    media_type: uploadedMediaType || 'image',
                    sizeBytes: uploadedSizeBytes,
                    createdAt: new Date().toISOString()
                },
                click_url: document.getElementById('f-url').value.trim(),
                schedule: {
                    start_date: document.getElementById('f-start').value,
                    end_date: document.getElementById('f-end').value
                },
                budget: {
                    daily_limit: parseInt(document.getElementById('f-daily').value) || 100,
                    total_limit: parseInt(document.getElementById('f-total').value) || 1000,
                    rates: rates,
                    spent_today: 0,
                    spent_today_date: AD_SDK.todayStr(),
                    spent_total: 0
                },
                targeting: document.getElementById('f-targeting').value,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
        }

        function saveCampaignDraft() {
            const data = gatherFormData();
            if (!data) return;
            data.status = 'draft';
            const camps = AD_SDK.getCampaigns();
            camps.push(data);
            AD_SDK.saveCampaigns(camps);
            resetForm();
            renderAll();
            showToast('💾', '草稿已儲存');
        }

        function submitForReview() {
            const data = gatherFormData();
            if (!data) return;
            if (!data.creative.fileId) {
                showToast('⚠️', '請上傳素材後再送審');
                return;
            }
            data.status = 'pending';
            const camps = AD_SDK.getCampaigns();
            camps.push(data);
            AD_SDK.saveCampaigns(camps);
            resetForm();
            renderAll();
            showToast('📤', '已送審！請等待管理員審核');
        }

        function resetForm() {
            document.getElementById('f-name').value = '';
            document.getElementById('f-url').value = '';
            document.getElementById('f-file').value = '';
            uploadedFileId = '';
            uploadedMediaType = '';
            uploadedFileName = '';
            uploadedSizeBytes = 0;
            document.getElementById('preview-area').style.display = 'none';
            document.getElementById('upload-area').querySelector('.upload-text').textContent = '點擊或拖曳上傳影片/圖片';
        }

        // ===== 活動操作 =====
        function pauseCampaign(id) {
            const camps = AD_SDK.getCampaigns();
            const c = camps.find(x => x.id === id);
            if (c) { c.status = 'paused'; c.updated_at = new Date().toISOString(); }
            AD_SDK.saveCampaigns(camps);
            renderAll();
            showToast('⏸️', '活動已暫停');
        }

        function resumeCampaign(id) {
            const camps = AD_SDK.getCampaigns();
            const c = camps.find(x => x.id === id);
            if (c) { c.status = 'active'; c.updated_at = new Date().toISOString(); }
            AD_SDK.saveCampaigns(camps);
            renderAll();
            showToast('▶️', '活動已恢復');
        }

        function resubmitCampaign(id) {
            const camps = AD_SDK.getCampaigns();
            const c = camps.find(x => x.id === id);
            if (c) { c.status = 'pending'; c.updated_at = new Date().toISOString(); }
            AD_SDK.saveCampaigns(camps);
            renderAll();
            showToast('📤', '已重新送審');
        }

        function deleteCampaign(id) {
            if (!confirm('確定刪除此活動？')) return;
            let camps = AD_SDK.getCampaigns();
            camps = camps.filter(x => x.id !== id);
            AD_SDK.saveCampaigns(camps);
            renderAll();
            showToast('🗑️', '活動已刪除');
        }

        // ===== 成效計算 =====
        function getCampaignStats(campId) {
            const events = AD_SDK.getEvents();
            const filtered = events.filter(e => e.campaign_id === campId);
            const impressions = filtered.filter(e => e.event_type === 'impression').length;
            const completes = filtered.filter(e => e.event_type === 'complete').length;
            const clicks = filtered.filter(e => e.event_type === 'click').length;
            const reports = filtered.filter(e => e.event_type === 'report').length;
            const ctr = impressions > 0 ? ((clicks / impressions) * 100).toFixed(1) : '0.0';
            return { impressions, completes, clicks, reports, ctr };
        }

        // ===== Delivery Status Reason =====
        function getDeliveryStatusReason(c) {
            if (c.status === 'draft') return { delivering: false, reason: '✒️ 草稿尚未送審' };
            if (c.status === 'pending') return { delivering: false, reason: '⏳ 待管理員審核' };
            if (c.status === 'paused') return { delivering: false, reason: '⏸️ 已由贊助商暂停' };
            if (c.status === 'expired') return { delivering: false, reason: '⛔ 活動已過期' };
            if (c.status !== 'active') return { delivering: false, reason: `狀態: ${c.status}` };

            // active 狀態，檢查各種條件
            const id = getSponsorId();
            const wallets = AD_SDK.getSponsorWallets();
            const w = wallets[id] || { balance: 0 };
            const cpc = c.budget?.cpc || 0;

            if (w.balance < cpc) return { delivering: false, reason: '💰 帳戶餘額不足' };

            // 日期區間
            const today = AD_SDK.todayStr();
            if (c.schedule?.start_date && today < c.schedule.start_date)
                return { delivering: false, reason: '📅 尚未到開始日期' };
            if (c.schedule?.end_date && today > c.schedule.end_date)
                return { delivering: false, reason: '📅 已過結束日期' };

            // 今日預算
            if (c.budget?.daily_limit && (c.budget.spent_today || 0) >= c.budget.daily_limit)
                return { delivering: false, reason: '📊 今日預算已耗盡' };

            // 總預算
            if (c.budget?.total_limit && (c.budget.spent_total || 0) >= c.budget.total_limit)
                return { delivering: false, reason: '📊 總預算已耗盡' };

            return { delivering: true, reason: '✅ 正常投放中' };
        }

        // ===== 素材重傳 =====
        function reuploadMaterial(campId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;
                try {
                    const fileId = await IDB_FILES.save({
                        blob: file,
                        type: file.type,
                        name: file.name,
                        sizeBytes: file.size
                    });
                    // 更新 campaign
                    const camps = AD_SDK.getCampaigns();
                    const c = camps.find(x => x.id === campId);
                    if (c && c.creative) {
                        c.creative.fileId = fileId;
                        c.creative.media_type = file.type.startsWith('video') ? 'video' : 'image';
                        c.creative.fileName = file.name;
                        c.creative.sizeBytes = file.size;
                        c.updated_at = new Date().toISOString();
                    }
                    AD_SDK.saveCampaigns(camps);
                    renderAll();
                    showToast('✅', '素材重新上傳成功');
                } catch (err) {
                    console.error('[reupload]', err);
                    showToast('❌', '上傳失敗，請重試');
                }
            };
            input.click();
        }

        // ===== 預覽 =====
        function previewCampaign(campId) {
            const camps = AD_SDK.getCampaigns();
            const c = camps.find(x => x.id === campId);
            if (!c) return;
            if (c.type === 'rewarded') {
                AD_SDK.previewRewarded(c);
            } else {
                // banner 預覽：在 modal 中顯示
                const container = document.createElement('div');
                container.id = 'temp-banner-preview';
                container.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:5000;display:flex;align-items:center;justify-content:center;cursor:pointer;';
                container.onclick = () => container.remove();
                const inner = document.createElement('div');
                inner.style.cssText = 'max-width:400px;width:90%;';
                container.appendChild(inner);
                document.body.appendChild(container);
                AD_SDK.previewBanner(inner, c);
            }
        }

        // ===== 渲染 =====
        function renderAll() {
            const id = getSponsorId();
            const wallets = AD_SDK.getSponsorWallets();
            const w = wallets[id] || { balance: 0, total_deposited: 0, total_spent: 0 };

            document.getElementById('w-balance').textContent = w.balance;
            document.getElementById('w-spent').textContent = w.total_spent;

            // 活動列表
            const camps = AD_SDK.getCampaigns().filter(c => c.sponsor_id === id);
            const activeCount = camps.filter(c => c.status === 'active').length;
            document.getElementById('w-active-count').textContent = activeCount;

            const listEl = document.getElementById('campaign-list');
            if (camps.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>尚無廣告活動</div></div>';
            } else {
                listEl.innerHTML = camps.map(c => {
                    const stats = getCampaignStats(c.id);
                    const thumb = c.creative?.thumbnail_base64 || c.creative?.data_base64;
                    let thumbHTML = (c.type === 'rewarded' ? '🎬' : '🖼️');
                    if (thumb) {
                        thumbHTML = `<img src="${thumb}" alt="">`;
                    } else if (c.creative?.fileId) {
                        thumbHTML = `<div class="campaign-thumb-placeholder" data-fid="${c.creative.fileId}">⭐</div>`;
                    }

                    // 素材狀態檢查
                    let materialWarnHTML = '';
                    if (c.creative?.fileId) {
                        // 非同步檢查，用 data attribute 標記稍後檢查
                        materialWarnHTML = `<div class="material-warn" id="matcheck-${c.id}" style="display:none;"></div>`;
                    }

                    const statusLabels = {
                        draft: '草稿', pending: '待審核', active: '已上線',
                        paused: '已暫停', expired: '已過期'
                    };

                    // Delivery 狀態原因
                    const delivery = getDeliveryStatusReason(c);
                    const deliveryClass = delivery.delivering ? 'delivering' : 'not-delivering';

                    // 預算進度條
                    const dailySpent = c.budget?.spent_today || 0;
                    const dailyLimit = c.budget?.daily_limit || 0;
                    const totalSpent = c.budget?.spent_total || 0;
                    const totalLimit = c.budget?.total_limit || 0;

                    let budgetHTML = '';
                    if (dailyLimit > 0) {
                        const dailyPct = Math.min(100, (dailySpent / dailyLimit) * 100);
                        budgetHTML += `
                        <div class="budget-bar-wrap">
                            <div class="bar-label"><span>今日預算</span><span>${dailySpent}/${dailyLimit}</span></div>
                            <div class="budget-bar"><div class="budget-bar-fill daily" style="width:${dailyPct}%;"></div></div>
                        </div>`;
                    }
                    if (totalLimit > 0) {
                        const totalPct = Math.min(100, (totalSpent / totalLimit) * 100);
                        budgetHTML += `
                        <div class="budget-bar-wrap">
                            <div class="bar-label"><span>總預算</span><span>${totalSpent}/${totalLimit}</span></div>
                            <div class="budget-bar"><div class="budget-bar-fill total" style="width:${totalPct}%;"></div></div>
                        </div>`;
                    }

                    let actions = '';
                    if (c.status === 'draft') {
                        actions = `<button onclick="resubmitCampaign('${c.id}')">📤 送審</button>
                                   <button onclick="deleteCampaign('${c.id}')">🗑️</button>`;
                    } else if (c.status === 'active') {
                        actions = `<button onclick="pauseCampaign('${c.id}')">⏸️ 暫停</button>`;
                    } else if (c.status === 'paused') {
                        actions = `<button onclick="resumeCampaign('${c.id}')">▶️ 恢復</button>
                                   <button onclick="deleteCampaign('${c.id}')">🗑️</button>`;
                    } else if (c.status === 'pending') {
                        actions = `<span style="font-size:0.7rem;color:var(--gold);">審核中...</span>`;
                    }

                    // Rates Display
                    let ratesMeta = '';
                    if (c.budget?.rates) {
                        if (c.type === 'rewarded') {
                            ratesMeta = `曝光: ${c.budget.rates.impression || 0} / 完整: ${c.budget.rates.complete || 0} / 點擊: ${c.budget.rates.click || 0}`;
                        } else {
                            ratesMeta = `曝光: ${c.budget.rates.impression || 0} / 點擊: ${c.budget.rates.click || 0}`;
                        }
                    } else if (c.budget?.cpc) {
                        ratesMeta = `CPC ${c.budget.cpc}`;
                    }

                    return `
                    <div class="campaign-item">
                        <div class="campaign-thumb">${thumbHTML}</div>
                        <div class="campaign-info">
                            <div class="name">${c.name}</div>
                            <div class="meta">${c.type === 'rewarded' ? '🎬 獎勵影片' : '🖼️ 橫幅'} ·
                                ${ratesMeta} · 已花 ${c.budget?.spent_total || 0}</div>
                            <div class="delivery-reason ${deliveryClass}">${delivery.reason}</div>
                            ${budgetHTML}
                            ${materialWarnHTML}
                        </div>
                        <div class="campaign-stats">
                            <div class="stat"><div class="num">${stats.impressions}</div><div class="lbl">曝光</div></div>
                            <div class="stat"><div class="num">${stats.completes}</div><div class="lbl">完整觀看</div></div>
                            <div class="stat"><div class="num">${stats.clicks}</div><div class="lbl">點擊</div></div>
                            <div class="stat"><div class="num">${stats.ctr}%</div><div class="lbl">CTR</div></div>
                        </div>
                        <span class="status-badge ${c.status}">${statusLabels[c.status] || c.status}</span>
                        <div class="campaign-actions">
                            ${actions}
                            <button class="preview-btn" onclick="previewCampaign('${c.id}')">👁️ 預覽</button>
                        </div>
                    </div>`;
                }).join('');

                // 非同步檢查素材是否存在
                camps.forEach(c => {
                    if (c.creative?.fileId) {
                        IDB_FILES.get(c.creative.fileId).then(data => {
                            const el = document.getElementById('matcheck-' + c.id);
                            if (el && !data) {
                                el.style.display = 'block';
                                el.innerHTML = `⚠️ 素材遺失 <button onclick="reuploadMaterial('${c.id}')" style="font-size:0.7rem;margin-left:0.3rem;cursor:pointer;background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:2px 6px;">🔄 重傳</button>`;
                            }
                        }).catch(() => { });
                    }
                });
            }

            // 交易紀錄
            const history = AD_SDK.getSponsorHistory(id);
            const histEl = document.getElementById('wallet-history');
            if (history.length === 0) {
                histEl.innerHTML = '<div class="empty-state">尚無交易紀錄</div>';
            } else {
                histEl.innerHTML = history.slice().reverse().slice(0, 30).map(h => {
                    const isPositive = h.amount > 0;
                    const time = h.timestamp ? new Date(h.timestamp).toLocaleString('zh-TW') : '';
                    return `
                    <div class="history-item">
                        <div>
                            <div>${h.label}</div>
                            <div class="time">${time}</div>
                        </div>
                        <div class="amount ${isPositive ? 'positive' : 'negative'}">
                            ${isPositive ? '+' : ''}${h.amount}
                        </div>
                    </div>`;
                }).join('');
            }
        }

        // ===== Toast =====
        function showToast(icon, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-icon').textContent = icon;
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            // 權限檢查：只有 sponsor 或 admin 可進
            if (!requireRole('sponsor', 'admin')) return;

            // 日切重置今日預算
            AD_SDK.normalizeCampaignBudgetsToday();

            ensureSponsorProfile();
            ensureSponsorWallet();

            // 預設日期
            const today = AD_SDK.todayStr();
            document.getElementById('f-start').value = today;
            const nextMonth = new Date();
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            document.getElementById('f-end').value = nextMonth.toISOString().slice(0, 10);

            // 計費標準顯示（唯讀）
            updateRatesDisplay();
            document.getElementById('f-type').addEventListener('change', updateRatesDisplay);

            renderAll();
        });

        function updateRatesDisplay() {
            const type = document.getElementById('f-type').value;
            const rates = AD_SDK.getDefaultRates(type);
            const el = document.getElementById('f-cpc-display');
            if (el) {
                if (type === 'rewarded') {
                    el.textContent = `曝光: ${rates.impression} / 完整觀看: ${rates.complete} / 點擊: ${rates.click} 儲值金`;
                } else {
                    el.textContent = `曝光: ${rates.impression} / 點擊: ${rates.click} 儲值金`;
                }
            }
        }
    </script>

    <!-- ===== Hamburger Menu Logic ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerBtn = document.querySelector('.hamburger-btn');
            const navLinks = document.querySelector('.nav-links');
            
            if (hamburgerBtn && navLinks) {
                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    hamburgerBtn.classList.toggle('open');
                    navLinks.classList.toggle('active');
                });
                
                // Close menu when clicking outside
                document.addEventListener('click', (e) => {
                    if (navLinks.classList.contains('active') && !navLinks.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                        hamburgerBtn.classList.remove('open');
                        navLinks.classList.remove('active');
                    }
                });
            }
        });
    </script>
</body>
</html>
